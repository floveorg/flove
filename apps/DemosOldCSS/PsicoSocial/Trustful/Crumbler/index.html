<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRUMBLER</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <form class="tree-form" id="treeForm" action="#">
    <h1><a href="http://flove.org/trustful"">TRUSTFUL</a> CRUMBLER</h1>
    
    <br />
    <br />
    <!-- Nombre -->
    <label class="name-row">
      <input type="text" id="nombre" name="nombre" placeholder="Write a name here…" />
    </label>

    <!-- ============== CRUMBLE ============== -->
    <details open>
      <summary class="node">
        <input type="checkbox" id="cb-crumble" />
        <span class="title">Crumble</span>
      </summary>

      <details>
        <summary class="node">
          <input type="checkbox" id="cb-criticize" />
          <span class="title">Criticize</span>
        </summary>

        <label class="leaf">
          <input type="checkbox" id="cb-complaint" />
          <span>Complaint</span>
        </label>
        <label class="leaf">
          <input type="checkbox" id="cb-blackmail" />
          <span>Blackmail</span>
        </label>

        <details>
          <summary class="node">
            <input type="checkbox" id="cb-press" />
            <span class="title">Press</span>
          </summary>
          <label class="leaf"><input type="checkbox" id="cb-seize" /><span>Seize</span></label>
          <label class="leaf"><input type="checkbox" id="cb-constrain" /><span>Constrain</span></label>
          <label class="leaf"><input type="checkbox" id="cb-denounce" /><span>Denounce</span></label>
        </details>
      </details>

      <label class="leaf"><input type="checkbox" id="cb-disfavor" /><span>Disfavor</span></label>

      <details>
        <summary class="node">
          <input type="checkbox" id="cb-boycot" />
          <span class="title">Boycot</span>
        </summary>

        <details>
          <summary class="node">
            <input type="checkbox" id="cb-curse" />
            <span class="title">Curse</span>
          </summary>

          <details>
            <summary class="node">
              <input type="checkbox" id="cb-blame" />
              <span class="title">Blame</span>
            </summary>
            <label class="leaf"><input type="checkbox" id="cb-ignore" /><span>Ignore</span></label>
            <label class="leaf"><input type="checkbox" id="cb-insult" /><span>Insult</span></label>
            <label class="leaf"><input type="checkbox" id="cb-flame" /><span>Flame</span></label>
            <label class="leaf"><input type="checkbox" id="cb-other-blame" /><span>Other</span></label>
          </details>


          <details>
            <summary class="node">
              <input type="checkbox" id="cb-taunt" />
              <span class="title">Taunt</span>
            </summary>
            <label class="leaf"><input type="checkbox" id="cb-trash" /><span>Trash talk</span></label>
            <label class="leaf"><input type="checkbox" id="cb-bluster" /><span>Bluster</span></label>
            <label class="leaf"><input type="checkbox" id="cb-defamate1" /><span>Defamate</span></label>
          </details>
        </details>

        <details>
          <summary class="node">
            <input type="checkbox" id="cb-hit" />
            <span class="title">Hit</span>
          </summary>
          <label class="leaf"><input type="checkbox" id="cb-damage" /><span>Damage</span></label>
          <label class="leaf"><input type="checkbox" id="cb-punish" /><span>Punish</span></label>
          <label class="leaf"><input type="checkbox" id="cb-destroy" /><span>Destroy</span></label>
        </details>

        <details>
          <summary class="node">
            <input type="checkbox" id="cb-sue" />
            <span class="title">Sue</span>
          </summary>
          <label class="leaf"><input type="checkbox" id="cb-atpolice" /><span>At police</span></label>
          <label class="leaf"><input type="checkbox" id="cb-atcourt" /><span>At court</span></label>
          <label class="leaf"><input type="checkbox" id="cb-other-sue" /><span>Other</span></label>
        </details>
      </details>
    </details>

    <!-- ============== NOTIFYING ============== -->
    <details>
      <summary class="node">
        <input type="checkbox" id="cb-notifying" />
        <span class="title">Notifying</span>
      </summary>

      <details>
        <summary class="node">
          <input type="checkbox" id="cb-public" />
          <span class="title">Public</span>
        </summary>
        <label class="leaf"><input type="checkbox" id="cb-xperson" /><span>To x person</span></label>
        <label class="leaf"><input type="checkbox" id="cb-trustee" /><span>To x trustee</span></label>
        <label class="leaf"><input type="checkbox" id="cb-subscribers" /><span>Subscribers</span></label>
        <label class="leaf"><input type="checkbox" id="cb-restorers" /><span>Restorers</span></label>
      </details>

      <details>
        <summary class="node">
          <input type="checkbox" id="cb-warning" />
          <span class="title">warning</span>
        </summary>

        <label class="leaf"><input type="checkbox" id="cb-xtime" /><span>X time in advance</span></label>
        <label class="leaf"><input type="checkbox" id="cb-inxway" /><span>In x way</span></label>

        <details>
          <summary class="node">
            <input type="checkbox" id="cb-onlyif" />
            <span class="title">Only if</span>
          </summary>

          <details>
            <summary class="node">
              <input type="checkbox" id="cb-much" />
              <span class="title">Much</span>
            </summary>
            <label class="leaf"><input type="checkbox" id="cb-failure" /><span>Failure</span></label>
            <label class="leaf"><input type="checkbox" id="cb-offense" /><span>Offense</span></label>
            <label class="leaf"><input type="checkbox" id="cb-harm" /><span>Harm</span></label>
          </details>

          <details>
            <summary class="node">
              <input type="checkbox" id="cb-many" />
              <span class="title">Many</span>
            </summary>

            <details>
              <summary class="node">
                <input type="checkbox" id="cb-previous" />
                <span class="title">Previous</span>
              </summary>
              <label class="leaf"><input type="checkbox" id="cb-prev-failure" /><span>Failure</span></label>
              <label class="leaf"><input type="checkbox" id="cb-prev-offense" /><span>Offense</span></label>
              <label class="leaf"><input type="checkbox" id="cb-prev-harm" /><span>Harm</span></label>
            </details>

            <label class="leaf"><input type="checkbox" id="cb-disadv" /><span>Disadvantages for the trustee</span></label>
            <label class="leaf"><input type="checkbox" id="cb-others" /><span>Other people involved</span></label>
          </details>

          <label class="leaf"><input type="checkbox" id="cb-onlyif-other" /><span>Other</span></label>
        </details>
      </details>
    </details>

    <!-- Resumen -->
    <div class="summary-line" id="summaryLine">
      <strong>I allow to</strong>
      <span id="outName">—</span>
      <strong>to</strong>
      <span id="outList"></span>
      <strong>me</strong>
    </div>
  </form>

  <script>
    // Construye "permito a <nombre>: item1, item2, ..."
    const form = document.getElementById('treeForm');
    const nameInput = document.getElementById('nombre');
    const outName = document.getElementById('outName');
    const outList = document.getElementById('outList');

    function labelTextFor(input){
      // Para hojas <label class="leaf"><input><span>texto</span></label>
      const leaf = input.closest('label.leaf');
      if (leaf) return leaf.querySelector('span').textContent.trim();
      // Para nodos <summary class="node"><input><span class="title">texto</span></summary>
      const node = input.closest('summary.node');
      if (node) return node.querySelector('.title').textContent.trim();
      return '';
    }

    function refreshSummary(){
      outName.textContent = (nameInput.value || '—');
      const checked = [...form.querySelectorAll('input[type="checkbox"]:checked')];
      const names = checked.map(labelTextFor).filter(Boolean);
      outList.textContent = names.length ? ': ' + names.join(', ') : '';
    }

    form.addEventListener('change', refreshSummary);
    nameInput.addEventListener('input', refreshSummary);
    refreshSummary();
  </script>
</body>
</html>
