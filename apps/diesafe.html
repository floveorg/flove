<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=yes" />
  <title>✺ flove · DieSafe</title>
  <link rel="stylesheet" href="flove.css">
  <style>
    :root {
      /* flove identity overrides — warm tan DieSafe */
      --app-accent:        #b88a4a;
      --app-accent-soft:   #ead7b3;
      --app-ink-on-accent: #2c1d05;
    }
    /* ===== MINIMAL BASE — ORIGINAL TEXTS ===== */
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background: #faf9f6;
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.5;
      padding: 1.2rem 1rem 2.5rem;
      color: #1e1e1e;
    }

    /* ===== SOLID DIFFERENT FONTS ===== */
    h1, .site-header h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-weight: 400;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #d4d4d4;
      padding-bottom: 0.5rem;
      margin-bottom: 1.2rem;
      font-family: 'Arial', 'Helvetica', sans-serif;
    }

    .menu-trigger {
      font-family: system-ui, -apple-system, sans-serif;
      background: none;
      border: none;
      font-size: 1.8rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
      color: #2c2c2c;
      transition: background 0.1s;
    }
    .menu-trigger:hover {
      background: #eaeaea;
    }

    .menu-dropdown {
      position: relative;
      display: inline-block;
    }
    .menu-content {
      display: none;
      position: absolute;
      right: 0;
      top: 2.6rem;
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.1);
      border-radius: 18px;
      min-width: 170px;
      z-index: 100;
      padding: 0.5rem 0;
      border: 1px solid #e0e0e0;
      font-family: system-ui, sans-serif;
    }
    .menu-content.show {
      display: block;
    }
    .menu-item {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      padding: 0.7rem 1.5rem;
      text-align: left;
      font-size: 1rem;
      color: #1e1e1e;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      font-family: inherit;
    }
    .menu-item:last-child {
      border-bottom: none;
    }
    .menu-item:hover {
      background: #f5f5f5;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    .intro-text {
      font-family: 'Courier New', Courier, monospace;
      margin-bottom: 1.8rem;
      color: #2e2e2e;
      font-size: 1rem;
    }

    .scenario {
      background: white;
      border-radius: 24px;
      padding: 1.5rem 1.8rem;
      margin-bottom: 2rem;
      box-shadow: 0 6px 14px rgba(0,0,0,0.02);
      border: 1px solid #e6e6e6;
    }

    .scenario-body {
      display: block;
    }

    legend {
      font-family: 'Times New Roman', serif;
      font-weight: 500;
      padding: 0 0.8rem;
      font-size: 1.2rem;
      color: #2c2c2c;
    }

    fieldset {
      border: 1px solid #ccc;
      border-radius: 18px;
      padding: 1.2rem 1.2rem 1.5rem;
      margin-top: 1.2rem;
      background: #fdfdfd;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .grid-2 > * {
      flex: 1 1 calc(50% - 0.5rem);
      min-width: 180px;
    }
    .grid-3 > * {
      flex: 1 1 calc(33.33% - 0.7rem);
      min-width: 150px;
    }

    label {
      display: block;
      font-family: 'Arial', 'Helvetica', sans-serif;
      font-size: 0.9rem;
      color: #3d3d3d;
      margin-bottom: 0.2rem;
    }

    .field-mic-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0.3rem;
      width: 100%;
    }
    .field-mic-wrapper textarea,
    .field-mic-wrapper input[type="text"],
    .field-mic-wrapper select {
      flex: 1;
      width: 100%;
      padding: 0.75rem 0.9rem;
      border: 1px solid #b0a78a;
      border-radius: 16px;
      font-size: 0.95rem;
      background: white;
      font-family: 'Consolas', 'Monaco', monospace;
      resize: vertical;
      transition: background 0.2s, border 0.15s;
    }

    .field-mic-wrapper textarea:focus,
    .field-mic-wrapper input[type="text"]:focus {
      background: #fef9e3;
      border-color: #8b7e5e;
      outline: none;
      box-shadow: inset 0 0 0 1px #d6c8a8;
    }

    .mic-btn {
      background: #f0f0f0;
      border: 1px solid #aaa;
      border-radius: 40px;
      width: 42px;
      height: 42px;
      font-size: 1.4rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #2c3e50;
      transition: filter 0.1s, background 0.1s;
      flex-shrink: 0;
      margin-top: 2px;
      padding: 0;
      font-family: system-ui;
    }
    .mic-btn:hover {
      background: #e0e0e0;
    }
    .mic-btn.recording {
      background: #ffdede;
      border-color: #b44;
      color: #a11;
      box-shadow: 0 0 0 3px rgba(180,0,0,0.1);
    }

    button {
      background: #f2f2f2;
      border: 1px solid #b9b9b9;
      padding: 0.7rem 1.8rem;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: filter 0.15s, background 0.15s;
      font-family: 'Arial', sans-serif;
    }
    button:active {
      filter: brightness(0.85);
      background: #d9d9d9;
    }

    /* wavy border + tiny grey background */
    .phrase-panel {
      margin-top: 2.8rem;
      background: #f6f6f6;
      border: 3px dashed #9a8c7a;
      border-radius: 32px 12px 32px 12px;
      padding: 1.8rem 1.8rem 1.8rem;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
    }

    .phrase-title {
      font-family: 'Georgia', serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      border-bottom: 1px dotted #bbb;
      padding-bottom: 0.6rem;
    }
    .phrase-actions {
      display: flex;
      gap: 0.6rem;
      margin-left: auto;
    }
    .phrase-actions button {
      padding: 0.4rem 1.4rem;
      font-size: 0.9rem;
      background: white;
      border-radius: 30px;
      border: 1px solid #aaa;
    }

    .magic-output {
      background: #faf8f2;
      padding: 1.2rem 1.6rem;
      border-radius: 28px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1rem;
      border-left: 6px solid #bfb09a;
      margin: 0.8rem 0 1.6rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: #1e1e1e;
      border: 2px dotted #b3a187;
      display: none; /* hidden by default */
    }

    .phrase-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      font-family: 'Arial', sans-serif;
    }
    .phrase-row {
      display: flex;
      align-items: flex-start;
      border-bottom: 1px solid #dad3c4;
      padding: 0.5rem 0;
      font-size: 0.95rem;
    }
    .phrase-label {
      width: 130px;
      font-weight: 600;
      font-family: 'Times New Roman', serif;
      color: #2c3e50;
      text-transform: lowercase;
      font-variant: small-caps;
    }
    .phrase-content {
      flex: 1;
      color: #1e1e1e;
      white-space: pre-wrap;
      word-break: break-word;
      padding-right: 0.5rem;
      font-family: 'Consolas', monospace;
    }

    .subblock {
      margin-top: 1.4rem;
      border-top: 1px dashed #bbb;
      padding-top: 1rem;
    }
    h4 {
      font-family: 'Georgia', serif;
      font-weight: 450;
      margin: 0.8rem 0 0.5rem;
      font-size: 1rem;
      color: #2e2e2e;
    }

    .actions {
      display: none;
    }

    .magic-active .phrase-list {
      display: none;
    }
    .magic-active .magic-output {
      display: block;
    }

    @media (max-width: 600px) {
      body { padding: 0.8rem; }
      .scenario { padding: 1rem; }
      .phrase-label { width: 100px; }
    }
  </style>
</head>
<body>

<div class="flove-bar">
  <a class="flove-home" href="index.html">←</a>

</main>

<script>
  (function(){
    "use strict";

    // ---------- MENÚ ----------
    const menuToggle = document.getElementById('menuToggle');
    const menuContent = document.getElementById('menuContent');
    if(menuToggle && menuContent) {
      menuToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        menuContent.classList.toggle('show');
      });
      document.addEventListener('click', (e) => {
        if(!menuToggle.contains(e.target) && !menuContent.contains(e.target)) {
          menuContent.classList.remove('show');
        }
      });
      document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          menuContent.classList.remove('show');
        });
      });
    }

    // ---------- VOICE RECORDING ----------
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let activeRecognition = null;
    let activeButton = null;

    function stopCurrentRecognition() {
      if(activeRecognition) {
        try { activeRecognition.stop(); } catch(e) {}
        activeRecognition = null;
      }
      if(activeButton) {
        activeButton.classList.remove('recording');
        activeButton = null;
      }
    }

    function startVoiceForField(targetId, btn) {
      if(!SpeechRecognition) {
        alert("Tu navegador no soporta reconocimiento de voz.");
        return;
      }
      stopCurrentRecognition();
      const targetEl = document.getElementById(targetId);
      if(!targetEl) return;

      const recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = false;

      btn.classList.add('recording');
      activeRecognition = recognition;
      activeButton = btn;

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        if(targetEl.tagName === 'INPUT' || targetEl.tagName === 'TEXTAREA') {
          targetEl.value = transcript;
        } else if(targetEl.tagName === 'SELECT') {
          const opts = targetEl.options;
          for(let opt of opts) {
            if(opt.text.toLowerCase().includes(transcript.toLowerCase())) {
              targetEl.value = opt.value;
              break;
            }
          }
        }
        updatePhrasePanel();
      };

      recognition.onerror = () => stopCurrentRecognition();
      recognition.onend = () => {
        btn.classList.remove('recording');
        if(activeRecognition === recognition) activeRecognition = null;
        if(activeButton === btn) activeButton = null;
      };
      recognition.start();
    }

    document.querySelectorAll('.mic-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = btn.getAttribute('data-target');
        if(targetId) startVoiceForField(targetId, btn);
      });
    });

    // ---------- PHRASE PANEL: lógica de tabla y modo mágico ----------
    const panel = document.getElementById('phrasePanel');
    const phraseList = document.getElementById('phraseList');
    const magicOutput = document.getElementById('magicOutput');
    const magicToggleBtn = document.getElementById('magicToggleBtn');
    const copyBtn = document.getElementById('copyPhraseBtn');
    const shareBtn = document.getElementById('sharePhraseBtn');

    let magicActive = false;  // false = mostrar tabla, true = mostrar magic output

    // preposiciones rotativas
    const prepositions = ['con', 'en', 'sobre', 'acerca de', 'mediante', 'gracias a', 'junto a', 'bajo', 'ante', 'tras', 'durante', 'según', 'para', 'por', 'sin', 'hacia'];
    let prepIndex = 0;

    function getShortLabel(field) {
      const id = field.id;
      const map = {
        'sc1_title': 'título',
        'sc1_priority': 'preferencia',
        'sc1_env_location': 'lugar',
        'sc1_env_ritual': 'logística',
        'sc1_env_notes': 'procedimiento',
        'sc1_comp_x': 'acompañantes',
        'sc1_health_prefs': 'salud',
        'sc1_comp_notes': 'condiciones',
        'sc1_herit_things_to': 'donaciones',
        'sc1_herit_things_notes': 'notas herencia',
        'sc1_herit_msg_to': 'mensaje a mí',
        'sc1_herit_msg_at': 'a cercanos',
        'sc1_herit_msg_if': 'al mundo',
        'sc1_herit_msg_notes': 'mensaje libre',
        'sc1_herit_sch_date': 'fechas',
        'sc1_herit_sch_action': 'acciones',
        'sc1_herit_sch_if': 'condiciones',
        'sc1_herit_sch_notes': 'notas agenda',
        'sc1_before': 'antes',
        'sc1_during': 'durante',
        'sc1_after': 'después',
        'sc1_disclaimers': 'descargo',
        'sc1_legal_contact': 'contacto legal',
        'sc1_docs_location': 'documentos'
      };
      return map[id] || field.placeholder || field.name || id;
    }

    function getAllTextFields() {
      return Array.from(document.querySelectorAll('input[type="text"], textarea, select')).filter(el => el.id);
    }

    function generateMagicPhrase() {
      const fields = getAllTextFields();
      let combined = '';
      fields.forEach(field => {
        let val = field.value?.trim() || '';
        if(field.tagName === 'SELECT') {
          const opt = field.options[field.selectedIndex];
          val = opt ? opt.text.trim() : '';
        }
        if(val === '') return;
        const prep = prepositions[prepIndex % prepositions.length];
        combined += `${prep} ${val} `;
        prepIndex++;
      });
      return combined.trim() || '(sin contenido)';
    }

    function updatePhrasePanel() {
      // actualizar tabla siempre
      const fields = getAllTextFields();
      let html = '';
      fields.forEach(field => {
        let value = field.value || '';
        if(field.tagName === 'SELECT') {
          const opt = field.options[field.selectedIndex];
          value = opt ? opt.text : '';
        }
        const labelWord = getShortLabel(field);
        html += `<div class="phrase-row">
          <span class="phrase-label">${escapeHtml(labelWord)}</span>
          <span class="phrase-content">${escapeHtml(value) || '—'}</span>
        </div>`;
      });
      phraseList.innerHTML = html || '<div class="phrase-row">(sin campos)</div>';

      // si está en modo magic, actualizar el texto mágico
      if(magicActive) {
        magicOutput.textContent = `✨ ${generateMagicPhrase()}`;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // listener actualización
    document.querySelectorAll('input, textarea, select').forEach(el => {
      el.addEventListener('input', updatePhrasePanel);
    });

    // inicializar tabla
    updatePhrasePanel();

    // ---------- TOGGLE MAGIC ----------
    function setMagicMode(active) {
      magicActive = active;
      if(active) {
        panel.classList.add('magic-active');
        magicToggleBtn.textContent = '📋 Table';
        magicToggleBtn.title = 'Volver a la tabla';
        // generar frase mágica fresca
        prepIndex = 0; // reiniciar rotación para cada activación
        magicOutput.textContent = `✨ ${generateMagicPhrase()}`;
      } else {
        panel.classList.remove('magic-active');
        magicToggleBtn.textContent = '✨ Magic';
        magicToggleBtn.title = 'Vista combinada con preposiciones';
      }
    }

    magicToggleBtn.addEventListener('click', () => {
      setMagicMode(!magicActive);
    });

    // ---------- COPY (según modo) ----------
    copyBtn.addEventListener('click', async () => {
      let content = '';
      if(magicActive) {
        content = magicOutput.textContent.replace(/^✨\s*/, '');
      } else {
        const fields = getAllTextFields();
        fields.forEach(f => {
          let val = f.value || '';
          if(f.tagName === 'SELECT') {
            const opt = f.options[f.selectedIndex];
            val = opt ? opt.text : '';
          }
          content += `${getShortLabel(f)}: ${val}\n`;
        });
      }
      try {
        await navigator.clipboard.writeText(content);
        alert('✓ Copiado');
      } catch(e) {
        alert('No se pudo copiar');
      }
    });

    // ---------- SHARE (exportar HTML según modo) ----------
    function generateShareHTML() {
      if(magicActive) {
        const magicText = magicOutput.textContent.replace(/^✨\s*/, '');
        return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>DieSafe · frase mágica</title>
<style>body{font-family:system-ui;padding:2rem;background:#faf9f6;} .card{background:#f6f6f6;border:3px dashed #9a8c7a;border-radius:32px 12px;padding:2rem;max-width:800px;margin:0 auto;} h1{font-family:Georgia,serif;} p{font-family:'Courier New',monospace;font-size:1.2rem;}</style></head>
<body><div class="card"><h1>✨ Frase mágica · DieSafe</h1><p>${escapeHtml(magicText)}</p><p style="margin-top:2rem;">generado ${new Date().toLocaleString()}</p></div></body></html>`;
      } else {
        const fields = getAllTextFields();
        let rows = '';
        fields.forEach(f => {
          let val = f.value || '';
          if(f.tagName === 'SELECT') {
            const opt = f.options[f.selectedIndex];
            val = opt ? opt.text : '';
          }
          rows += `<tr><td style="padding:8px;border-bottom:1px solid #ccc;font-family:Times,serif;">${escapeHtml(getShortLabel(f))}</td><td style="padding:8px;font-family:Consolas,monospace;">${escapeHtml(val)||'—'}</td></tr>`;
        });
        return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>DieSafe · resume</title>
<style>body{font-family:system-ui;padding:2rem;background:#faf9f6;} .card{background:#f6f6f6;border:3px dashed #9a8c7a;border-radius:32px 12px;padding:2rem;max-width:900px;margin:0 auto;} h1{font-family:Georgia,serif;} table{width:100%;border-collapse:collapse;}</style></head>
<body><div class="card"><h1>📄 Resume · DieSafe</h1><table>${rows}</table><p style="margin-top:2rem;">generado ${new Date().toLocaleString()}</p></div></body></html>`;
      }
    }

    shareBtn.addEventListener('click', async () => {
      const htmlContent = generateShareHTML();
      const blob = new Blob([htmlContent], {type: 'text/html'});
      const file = new File([blob], magicActive ? 'diesafe_magic.html' : 'diesafe_resume.html', {type: 'text/html'});
      if(navigator.canShare && navigator.canShare({files: [file]})) {
        try {
          await navigator.share({ title: 'DieSafe', files: [file] });
          return;
        } catch(e) { if(e.name!=='AbortError') console.warn(e); }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = magicActive ? 'diesafe_magic.html' : 'diesafe_resume.html';
      a.click();
      URL.revokeObjectURL(url);
      alert('📄 Archivo HTML descargado');
    });

    window.addEventListener('beforeunload', stopCurrentRecognition);
    document.querySelectorAll('.mic-btn').forEach(b => b.type = 'button');
  })();
</script>
