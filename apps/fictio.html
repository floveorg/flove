<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>✺ flove · Fictio</title>
  <!-- extreme icons & fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&family=Marcellus&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="flove.css">
  <style>
    /* ----- radical contrast, dreamy mascot, left menu, floating points ----- */
    :root {
      --void: #03050b;
      --deep: #0b0e1a;
      --flare: #ffecb0;
      --neon-lime: #c6ff6e;
      --neon-cyan: #6ef0ff;
      --neon-violet: #c27dff;
      --hot-pink: #ff8ad0;
      --glass-edge: rgba(255, 220, 150, 0.18);
      --card-glow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(200, 220, 255, 0.12);
      --ink: #f2edff;
      /* flove identity overrides — violet Fictio */
      --app-accent:        #c27dff;
      --app-accent-soft:   #e3c8ff;
      --app-ink-on-accent: #1a0033;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: var(--void);
      color: var(--ink);
      line-height: 1.5;
      min-height: 100vh;
      position: relative;
    }

    .sky {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: -2;
      background: radial-gradient(circle at 30% 10%, #1f2b5c, #03050b 80%);
    }
    .stars {
      position: absolute; inset: 0;
      background: radial-gradient(2px 2px at 15% 25%, #fff9e6, transparent 80%),
                  radial-gradient(2px 2px at 75% 60%, #b3ffe0, transparent 80%),
                  radial-gradient(3px 3px at 40% 80%, #d9b8ff, transparent 80%),
                  radial-gradient(1px 1px at 90% 30%, #ffffff, transparent 80%);
      opacity: 0.9;
      animation: pulseStar 12s infinite alternate;
    }
    .nebula {
      position: absolute; inset: 0;
      background: radial-gradient(70vw 60vh at 80% 20%, rgba(180, 120, 255, 0.2), transparent 60%),
                  radial-gradient(60vw 50vh at 10% 80%, rgba(80, 240, 200, 0.18), transparent 60%);
      filter: blur(50px);
      mix-blend-mode: overlay;
      animation: driftSlow 30s infinite alternate;
    }

    .wrap {
      max-width: 1100px;
      margin: 2rem auto 5rem;
      padding: 0 1.2rem;
      position: relative;
      z-index: 5;
    }

    .card {
      background: rgba(8, 12, 24, 0.7);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--glass-edge);
      border-radius: 40px;
      box-shadow: var(--card-glow);
    }

    /* ----- DREAMY MASCOT (celestial fox) ----- */
    .mascot {
      position: fixed;
      top: 1.2rem;
      left: 1.8rem;
      font-size: 3.2rem;
      filter: drop-shadow(0 0 20px #b38cff) drop-shadow(0 0 40px #4e2e8a);
      cursor: help;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 101;
      background: radial-gradient(circle at 30% 30%, #ffe6b0, #d9b3ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px #d9b3ff;
    }
    .mascot:hover {
      transform: scale(1.15) rotate(2deg);
    }
    .mascot .bubble {
      position: absolute;
      left: 4.5rem;
      top: -0.2rem;
      background: #0f1a2b;
      border: 1.5px solid var(--neon-lime);
      border-radius: 40px 40px 40px 8px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: #f5e9ff;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 10px 20px #00000060;
      backdrop-filter: blur(8px);
    }
    .mascot:hover .bubble {
      opacity: 1;
      transform: translateY(-5px);
    }

    /* floating points — right anchored, glow on update */
    .points-float {
      position: fixed;
      left: 20px;
      bottom: 30px;
      background: rgba(18, 12, 36, 0.85);
      backdrop-filter: blur(16px);
      border: 2px solid var(--neon-violet);
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      box-shadow: 0 0 30px #a87eff, 0 8px 20px #000;
      z-index: 90;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.8rem;
      color: #fff9e0;
      transition: box-shadow 0.2s, transform 0.1s;
    }
    .points-float.highlight {
      box-shadow: 0 0 50px var(--neon-cyan), 0 0 90px #ffb86b;
      transform: scale(1.05);
    }
    .points-float i { color: var(--neon-lime); }

    
    /* headings */
    .heading {
      padding: 1.8rem 2rem;
      margin-bottom: 2rem;
      text-align: center;
      border-bottom: 2px solid var(--neon-cyan);
      position: relative;
    }
    .heading h1 {
      font-family: 'Marcellus', serif;
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 400;
      letter-spacing: 2px;
      color: #fff2d4;
      text-shadow: 0 0 12px var(--neon-violet), 0 0 30px #3d1e6d;
    }
    .heading h1 span { color: var(--neon-cyan); }

    /* sections */
    .sections-panel { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2.2rem; }
    .section-card {
      background: rgba(10, 15, 28, 0.75);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255, 220, 180, 0.25);
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 15px 30px -8px #00000080, 0 0 0 1px rgba(200, 255, 200, 0.1) inset;
      transition: all 0.25s;
    }
    .section-header {
      display: flex; align-items: center; gap: 1.2rem; padding: 1.5rem 1.8rem;
      cursor: pointer; user-select: none;
      background: linear-gradient(95deg, #0f1422, #161e30);
      border-bottom: 1px solid transparent;
      position: relative;
    }
    /* hover tooltip from mascot */
    .section-header:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 20px;
      background: #1b1233;
      border: 1px solid var(--neon-lime);
      color: #f5e6ff;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      backdrop-filter: blur(6px);
      box-shadow: 0 5px 15px #000;
      pointer-events: none;
      z-index: 20;
    }
    .section-card.expanded .section-header {
      border-bottom: 2px solid var(--neon-lime);
      background: linear-gradient(95deg, #131a2c, #1a233a);
    }
    .section-icon { font-size: 3.2rem; filter: drop-shadow(0 0 12px currentColor); min-width: 60px; }
    .section-title { font-size: 1.9rem; font-weight: 800; color: var(--neon-cyan); text-transform: uppercase; }
    .toggle-indicator { font-size: 2.2rem; color: var(--neon-lime); transition: transform 0.3s; }
    .section-card.expanded .toggle-indicator { transform: rotate(45deg); }

    .section-content {
      max-height: 0; opacity: 0; padding: 0 1.8rem; overflow: hidden;
      transition: max-height 0.5s, opacity 0.3s, padding 0.3s;
      background: #050a14b3;
    }
    .section-card.expanded .section-content {
      max-height: 600px; opacity: 1; padding: 1.8rem 1.8rem 2.2rem;
    }

    .dual-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .textarea-wrapper { position: relative; }
    textarea, input[type="text"] {
      width: 100%; background: #0c1322; border: 1.5px solid #38445e; border-radius: 24px;
      padding: 1rem 3.2rem 1rem 1.2rem; color: #f5f0ff; font-family: 'Manrope', sans-serif;
      resize: vertical; min-height: 100px;
      box-shadow: inset 0 8px 12px #00000055, 0 2px 0 #2a3a55;
    }
    textarea:focus { border-color: var(--hot-pink); box-shadow: inset 0 4px 12px #000, 0 0 18px #ffa3d6; outline: none; }
    .upload-btn {
      position: absolute; bottom: 12px; right: 12px; background: #1e2740;
      border: 1px solid var(--neon-cyan); color: var(--neon-cyan); border-radius: 50px;
      width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(5px); box-shadow: 0 4px 0 #0b0f18;
    }
    .upload-btn:hover { background: #2f3d60; border-color: var(--neon-lime); color: var(--neon-lime); }
    input[type="file"] { display: none; }

    .notes-area { margin: 2rem 0; }
    .phrase-card { margin: 2.2rem 0; padding: 2rem; background: #0f1625e0; border-radius: 48px; border-left: 8px solid var(--hot-pink); }
    #phraseDisplay { font-size: 1.3rem; background: #03050b80; padding: 1.5rem; border-radius: 28px; border: 1px dashed var(--neon-lime); }
    .btn {
      background: #141c2c; border: 1.5px solid #5f7a9f; color: #f0ebff; padding: 0.9rem 1.8rem;
      border-radius: 60px; font-weight: 700; font-size: 1.1rem; backdrop-filter: blur(10px);
      cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
      box-shadow: 0 6px 0 #0b0f18, 0 8px 20px #00000060; transition: all 0.1s; text-transform: uppercase;
    }
    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0b0f18, 0 8px 18px #000; }
    .btn-primary { background: #271a3f; border-color: var(--neon-violet); box-shadow: 0 6px 0 #1d1230, 0 0 20px #b77eff; }
    .btn-accent { background: #1e3a3a; border-color: var(--neon-cyan); }

    .share-save-card { display: flex; flex-wrap: wrap; justify-content: space-around; background: linear-gradient(145deg, #1b1136, #0e1424); border-radius: 80px; padding: 1.2rem; margin: 2.5rem 0; }

    @media (max-width: 680px) {
      .dual-fields { grid-template-columns: 1fr; }
      .points-float { font-size: 1.2rem; padding: 0.5rem 1rem; left: 10px; bottom: 10px; }
    }
  </style>
</head>
<body>

<div class="flove-bar flove-bar--dark">
  <a class="flove-home" href="index.html">←</a>
  <span class="flove-mark flove-asterism">✺</span>
  <span class="flove-app-name">fictio</span>
  <span class="flove-spacer"></span>
  <span class="flove-tag">tejedor de sueños</span>
</div>

<div class="sky"><div class="stars"></div><div class="nebula"></div></div>

<!-- DREAMY MASCOT (celestial fox) -->
<div class="mascot">
  <span>🦊✨🌙</span>
  <div class="bubble">🦊 Nox: real=1pt · fiction=2pts · hover headers for tips</div>
</div>

<!-- FLOATING POINTS (left anchored) -->
<div class="points-float" id="pointsFloat">
  <i class="fas fa-crown"></i> <span id="pointsValue">0</span> pts
</div>

<!-- TOP RIGHT MENU -->
<div class="menu-container">
  <div class="menu-toggle" id="menuToggle"></div>
  <div class="menu-panel" id="menuPanel">
    <div class="menu-item" data-action="reset"></div>
    <div class="menu-item" data-action="export"></div>
    <div class="menu-item" data-action="theme">
    <div class="menu-item" data-action="tips">
    <div class="menu-item" data-action="about">
  </div>
</div>

<main class="wrap">
  <header class="heading card">
    <h1>Real <span>✧</span> Fictions</h1>
    <p><i class="fas fa-infinity"></i> dreamweaver · weave realities <i class="fas fa-infinity"></i></p>
  </header>

  <div id="sectionsContainer" class="sections-panel"></div>

  <div class="add-section-form card" style="padding:1.5rem; display:flex; gap:1rem; border-radius:60px;">
    <div style="flex:2"><input type="text" id="newSectionTitle" placeholder="New realm title…" style="min-height:auto;"></div>
    <button class="btn btn-primary" id="addSectionBtn"><i class="fas fa-plus-circle"></i> Add box</button>
  </div>

  <div class="notes-area">
    <label><i class="fas fa-feather-alt"></i> Whispers & notes</label>
    <div class="textarea-wrapper">
      <textarea id="notesInput" placeholder="Context, transmissions…"></textarea>
      <span class="upload-btn" data-target="notes"><i class="fas fa-paperclip"></i></span>
      <input type="file" accept="image/*,video/*,audio/*" style="display:none" class="file-input">
    </div>
  </div>

  <div class="phrase-card card">
    <div class="phrase-title"><i class="fas fa-scroll"></i> woven phrase</div>
    <div id="phraseDisplay">✨ Add words to the realms… ✨</div>
    <div class="phrase-actions" style="display:flex; gap:1rem; flex-wrap:wrap; margin-top:1.5rem;">
      <button class="btn btn-accent" id="copyPhraseBtn"><i class="fas fa-copy"></i> Copy</button>
      <button class="btn btn-primary" id="insightBtn"><i class="fas fa-brain"></i> Insight</button>
      <button class="btn" id="creativeMixBtn"><i class="fas fa-dice-d6"></i> Get Creative</button>
    </div>
  </div>

  <div class="share-save-card">
    <button class="btn btn-primary" id="saveStateBtn"><i class="fas fa-save"></i> Save</button>
    <button class="btn btn-accent" id="shareBtn"><i class="fas fa-share-alt"></i> Share</button>
    <button class="btn" id="publishBtn"><i class="fas fa-cloud-upload-alt"></i> Publish</button>
  </div>
</main>

<script>
  (function(){
    const defaultSections = [
      { id: 'event', title: 'Event', icon: '🌠', sub: 'happened / could happen', realPlaceholder: 'community garden opening…', ficPlaceholder: 'moonlight festival on a floating island…' },
      { id: 'fact', title: 'Simple Fact', icon: '📌', sub: 'clear statement', realPlaceholder: 'seeds sprout in 3–7 days…', ficPlaceholder: 'moths deliver tiny letters at dawn…' },
      { id: 'idea', title: 'Abstract Idea', icon: '🌀', sub: 'concept / principle', realPlaceholder: 'mutual aid as long-term resilience…', ficPlaceholder: 'rivers remember names whispered to them…' },
      { id: 'project', title: 'Project', icon: '🚀', sub: 'organized effort', realPlaceholder: 'build a seed library & workshop…', ficPlaceholder: 'cartography of dreams in starlight ink…' }
    ];

    let sections = [];
    const container = document.getElementById('sectionsContainer');
    const phraseDisplay = document.getElementById('phraseDisplay');
    const notesInput = document.getElementById('notesInput');
    const pointsSpan = document.getElementById('pointsValue');
    const pointsFloat = document.getElementById('pointsFloat');

    // mascot tips for headers
    const headerTips = {
      'Event': '🦊 Nox: "Events shape worlds — real or imagined."',
      'Simple Fact': '🦊 "Facts anchor us; fictional facts let us fly."',
      'Abstract Idea': '🦊 "Ideas are the seeds of new dimensions."',
      'Project': '🦊 "Projects turn dreams into tangible echoes."'
    };

    function calculatePoints() {
      let total = 0;
      document.querySelectorAll('.section-card').forEach(card => {
        const real = card.querySelector('.real-input')?.value.trim();
        const fic = card.querySelector('.fic-input')?.value.trim();
        if (real) total += 1;
        if (fic) total += 2;
      });
      return total;
    }

    let lastPoints = 0;
    function updatePointsAndPhrase() {
      const pts = calculatePoints();
      pointsSpan.textContent = pts;
      if (pts !== lastPoints) {
        pointsFloat.classList.add('highlight');
        setTimeout(() => pointsFloat.classList.remove('highlight'), 400);
        lastPoints = pts;
      }
      updatePhraseDisplay();
    }

    function syncSectionsFromDOM() {
      const cards = document.querySelectorAll('.section-card');
      cards.forEach((card, idx) => {
        if (idx < sections.length) {
          const real = card.querySelector('.real-input');
          const fic = card.querySelector('.fic-input');
          if (real) sections[idx].realValue = real.value;
          if (fic) sections[idx].ficValue = fic.value;
        }
      });
    }

    function generatePhraseText() {
      syncSectionsFromDOM();
      const notes = notesInput.value.trim();
      let parts = [`🦊✨ Real ✧ Fictions · ${new Date().toLocaleDateString()}`];
      sections.forEach(sec => {
        const real = sec.realValue?.trim();
        const fic = sec.ficValue?.trim();
        if (real || fic) {
          parts.push(`${sec.icon} ${sec.title}: ${real ? 'Real → '+real : ''} ${real&&fic?'||':''} ${fic ? 'Fictional → '+fic : ''}`);
        }
      });
      if (notes) parts.push(`📜 whispers: ${notes}`);
      return parts.length>1 ? parts.join('\n\n') : '🌱 Plant some words…';
    }

    function updatePhraseDisplay() {
      phraseDisplay.textContent = generatePhraseText();
    }

    // creative mix: pair random real with random fictional
    function generateCreativeMix() {
      syncSectionsFromDOM();
      const allReals = [];
      const allFics = [];
      sections.forEach(sec => {
        if (sec.realValue?.trim()) allReals.push({ text: sec.realValue.trim(), section: sec.title });
        if (sec.ficValue?.trim()) allFics.push({ text: sec.ficValue.trim(), section: sec.title });
      });
      if (allReals.length === 0 || allFics.length === 0) {
        phraseDisplay.textContent = '🦊 Need at least one real and one fictional entry to mix.';
        return;
      }
      const randomReal = allReals[Math.floor(Math.random() * allReals.length)];
      const randomFic = allFics[Math.floor(Math.random() * allFics.length)];
      const mixed = `🌀 Creative mix: "${randomReal.text}" (from ${randomReal.section})  ✧  "${randomFic.text}" (from ${randomFic.section})  —  where real meets dream.`;
      phraseDisplay.textContent = mixed;
    }

    function renderSections() {
      container.innerHTML = '';
      sections.forEach((sec, idx) => {
        const card = document.createElement('div');
        card.className = 'section-card';
        const header = document.createElement('div');
        header.className = 'section-header';
        header.setAttribute('data-tip', headerTips[sec.title] || '🦊 Fill both realms to earn more points!');
        header.innerHTML = `
          <span class="section-icon">${sec.icon}</span>
          <div style="flex:1"><div class="section-title">${sec.title} <span style="font-size:0.9rem; color:var(--flare);">${sec.sub}</span></div></div>
          <span class="toggle-indicator"><i class="fas fa-plus-circle"></i></span>
        `;
        const content = document.createElement('div');
        content.className = 'section-content';
        content.innerHTML = `
          <div class="dual-fields">
            <div><label class="field-label"><i class="fas fa-globe"></i> REAL</label><div class="textarea-wrapper"><textarea class="real-input" placeholder="${sec.realPlaceholder}">${sec.realValue||''}</textarea><span class="upload-btn"><i class="fas fa-image"></i></span><input type="file" accept="image/*,video/*,audio/*" style="display:none"></div></div>
            <div><label class="field-label"><i class="fas fa-hat-wizard"></i> FICTIONAL</label><div class="textarea-wrapper"><textarea class="fic-input" placeholder="${sec.ficPlaceholder}">${sec.ficValue||''}</textarea><span class="upload-btn"><i class="fas fa-cloud-upload-alt"></i></span><input type="file" accept="image/*,video/*,audio/*" style="display:none"></div></div>
          </div>
        `;
        card.appendChild(header); card.appendChild(content);
        header.addEventListener('click', (e) => { e.stopPropagation(); card.classList.toggle('expanded'); });
        
        // upload listeners
        card.querySelectorAll('.textarea-wrapper').forEach(w => {
          const btn = w.querySelector('.upload-btn');
          const file = w.querySelector('input[type="file"]');
          const ta = w.querySelector('textarea');
          btn.addEventListener('click', (e) => { e.stopPropagation(); file.click(); });
          file.addEventListener('change', (e) => {
            const f = e.target.files[0]; if(!f) return;
            ta.value = ta.value + ` [📎 ${f.name}] `;
            updatePointsAndPhrase(); file.value = '';
          });
        });
        card.querySelectorAll('textarea').forEach(ta => ta.addEventListener('input', updatePointsAndPhrase));
        container.appendChild(card);
      });

      // notes upload
      const notesWrap = document.querySelector('.notes-area .textarea-wrapper');
      if(notesWrap) {
        const btn = notesWrap.querySelector('.upload-btn');
        const file = notesWrap.querySelector('.file-input');
        btn.addEventListener('click', () => file.click());
        file.addEventListener('change', (e) => {
          const f = e.target.files[0]; if(!f) return;
          notesInput.value = notesInput.value + ` [📎 ${f.name}] `;
          updatePointsAndPhrase(); file.value = '';
        });
      }
      notesInput.addEventListener('input', updatePointsAndPhrase);
      updatePointsAndPhrase();
    }

    function initSections() {
      sections = defaultSections.map(s => ({...s, realValue:'', ficValue:''}));
      renderSections();
    }

    function addSection(title) {
      if(!title.trim()) title='custom realm';
      sections.push({ id:'cust'+Date.now(), title, icon:'⚡', sub:'your dimension', realPlaceholder:'real…', ficPlaceholder:'fictional…', realValue:'', ficValue:'' });
      renderSections();
    }

    // menu
    const menuToggle = document.getElementById('menuToggle');
    const menuPanel = document.getElementById('menuPanel');
    menuToggle.addEventListener('click', (e) => { e.stopPropagation(); menuPanel.classList.toggle('open'); });
    document.addEventListener('click', (e) => { if(!menuPanel.contains(e.target) && e.target!==menuToggle) menuPanel.classList.remove('open'); });
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const act = item.dataset.action;
        if(act==='reset'){ if(confirm('Reset?')){ initSections(); notesInput.value=''; updatePointsAndPhrase(); } }
        else if(act==='export'){ const data = {sections: sections.map(s=>({...s})), notes:notesInput.value}; const blob=new Blob([JSON.stringify(data)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='real-fictions.json'; a.click(); }
        else if(act==='theme'){ document.body.style.filter = document.body.style.filter ? '' : 'hue-rotate(25deg)'; }
        else if(act==='tips'){ alert('🦊 Nox: "Hover headers for wisdom. Upload media with 📎. Real=1pt, Fiction=2pts."'); }
        else if(act==='about'){ alert('Real Fictions · dreamweaver edition. Mix realities.'); }
        menuPanel.classList.remove('open');
      });
    });

    // load/save
    function saveState() {
      syncSectionsFromDOM();
      localStorage.setItem('realFictions_dream', JSON.stringify({sections, notes: notesInput.value}));
      alert('💾 Saved.');
    }
    function loadState() {
      const saved = localStorage.getItem('realFictions_dream');
      if(!saved) return;
      try {
        const state = JSON.parse(saved);
        if(state.sections) sections = state.sections.map(s=>({...s, realValue:s.realValue||'', ficValue:s.ficValue||''}));
        if(state.notes) notesInput.value = state.notes;
        renderSections();
      }catch(e){}
    }

    window.addEventListener('DOMContentLoaded', () => {
      initSections(); loadState();
      document.getElementById('addSectionBtn').addEventListener('click', () => {
        addSection(document.getElementById('newSectionTitle').value);
        document.getElementById('newSectionTitle').value = '';
      });
      document.getElementById('copyPhraseBtn').addEventListener('click', () => {
        navigator.clipboard?.writeText(phraseDisplay.textContent).then(()=>alert('📋 Copied')).catch(()=>alert('Copy manually'));
      });
      document.getElementById('insightBtn').addEventListener('click', () => {
        const pts = calculatePoints();
        alert(`🦊 Nox: ${pts} points. ${pts<5?'Add more — fiction yields double!': pts<15?'You\'re weaving a nice tapestry.':'Brilliant contrast!'}`);
      });
      document.getElementById('creativeMixBtn').addEventListener('click', generateCreativeMix);
      document.getElementById('saveStateBtn').addEventListener('click', saveState);
      document.getElementById('shareBtn').addEventListener('click', () => {
        if(navigator.share) navigator.share({title:'Real Fictions', text: phraseDisplay.textContent.slice(0,200)}).catch(()=>{});
        else alert('📤 Share:\n'+phraseDisplay.textContent);
      });
      document.getElementById('publishBtn').addEventListener('click', () => alert('📡 Echo published to nebula.'));
      
      lastPoints = calculatePoints();
    });
  })();
</script>
