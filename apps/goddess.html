<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✺ flove · God(dess)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="flove.css">
    <style>
        :root {
            /* flove identity overrides — lavender God(dess) */
            --app-accent:        #8b5cf6;
            --app-accent-soft:   #ddd2ff;
            --app-ink-on-accent: #1f0f4a;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f8f9fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px 12px 32px;
        }

        .app {
            max-width: 580px;
            width: 100%;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.7rem;
            font-weight: 400;
            letter-spacing: -0.5px;
            color: #1e1e2a;
        }

        .logo i {
            font-size: 2rem;
            color: #7c6a9c;
            background: #ede8f5;
            padding: 8px;
            border-radius: 18px;
        }

        .logo span { font-weight: 300; }
        .logo strong {
            font-weight: 600;
            background: linear-gradient(135deg, #4a3a6a, #2e3b4e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .menu-container { position: relative; }
        .menu-btn {
            background: white;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            color: #2e2e3a;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            background: rgba(255,255,255,0.9);
            border: 1px solid rgba(124,106,156,0.15);
            transition: all 0.15s;
        }
        .menu-btn i { color: #7c6a9c; }

        .dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.15);
            min-width: 180px;
            padding: 8px 0;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.2s ease;
            z-index: 30;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.98);
        }
        .dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .dropdown-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1e1e2a;
            font-weight: 450;
            text-decoration: none;
            transition: background 0.1s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
        }
        .dropdown-item i { width: 20px; color: #7c6a9c; }
        .dropdown-item:hover { background: #f3effa; }

        .slogan {
            font-size: 1.4rem;
            font-weight: 340;
            margin: 12px 0 20px;
            color: #3a2e4e;
            letter-spacing: -0.02em;
            border-left: 5px solid #b7a4d4;
            padding-left: 18px;
        }
        .slogan i { color: #9b87b8; margin-right: 6px; }

        /* matrix */
        .matrix-section { margin: 8px 0 16px; }
        .matrix-grid {
            display: grid;
            grid-template-columns: 90px repeat(3, 1fr);
            background: #ffffffc7;
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 10px 6px;
            box-shadow: 0 10px 25px -8px rgba(45,30,65,0.1);
            border: 1px solid #e4d9f2;
        }
        .grid-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 12px 4px;
            font-weight: 500;
            min-height: 64px;
            transition: all 0.15s;
        }
        .row-header {
            font-weight: 550;
            color: #4a385e;
            font-size: 1rem;
            justify-content: flex-start;
            padding-left: 16px;
        }
        .col-header {
            font-weight: 600;
            color: #2d253b;
            background: transparent;
            font-size: 1rem;
        }
        .data-cell {
            background: #ffffffb3;
            border-radius: 22px;
            margin: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            cursor: pointer;
            user-select: none;
            border: 1.5px solid #ede4fc;
            font-size: 1.5rem;
            color: #2e1e42;
            transition: all 0.18s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        .data-cell i {
            font-size: 1.7rem;
            color: #1e7a6c;
            filter: drop-shadow(0 2px 4px rgba(26,127,108,0.2));
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
        }
        .data-cell.selected {
            background: #e9defa;
            border-color: #a28cc2;
            box-shadow: 0 6px 12px -4px rgba(124,90,180,0.2);
        }
        .data-cell.selected i {
            opacity: 1;
            transform: scale(1.2);
            color: #0e5e4f;
        }
        .data-cell:active { transform: scale(0.94); background: #d8c8f0; }

        @media (max-width: 420px) {
            .matrix-grid { grid-template-columns: 70px repeat(3, 1fr); }
            .row-header { padding-left: 10px; font-size: 0.9rem; }
            .col-header { font-size: 0.9rem; }
            .data-cell { min-height: 56px; font-size: 1.3rem; }
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0 20px;
            justify-content: center;
        }
        .btn {
            background: white;
            border: 1px solid #d9c9f0;
            padding: 14px 22px;
            border-radius: 60px;
            font-weight: 550;
            font-size: 1rem;
            color: #2d253b;
            box-shadow: 0 6px 12px -6px rgba(0,0,0,0.05);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            background: rgba(255,255,255,0.9);
            transition: all 0.15s;
            flex: 1 0 100px;
        }
        .btn i { color: #7c6a9c; }
        .btn:hover {
            background: #ffffff;
            border-color: #b59ed6;
            box-shadow: 0 12px 18px -8px rgba(102,70,140,0.12);
            transform: translateY(-2px);
        }

        /* Insights */
        .insights-wrapper {
            display: flex;
            justify-content: center;
            margin: 20px 0 10px;
        }
        .insight-btn {
            background: #2d253b;
            color: white;
            border: none;
            padding: 16px 36px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 500;
            box-shadow: 0 18px 28px -12px #3d2c55;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            border: 1px solid #5f4b78;
        }
        .insight-btn i { color: #d9c5ff; }
        .insight-btn:hover { background: #3f314f; }

        .hint-area {
            margin-top: 18px;
            text-align: center;
            min-height: 48px;
            font-size: 1rem;
            color: #3a2c4e;
            background: #efe6fc;
            padding: 12px 18px;
            border-radius: 60px;
            opacity: 0.9;
        }

        .footer-note {
            margin-top: 24px;
            text-align: center;
            color: #988bb0;
            font-size: 0.8rem;
        }

        /* No phrase block, no share preview card */
    </style>
</head>
<body>

<div class="flove-bar">
  <a class="flove-home" href="index.html">←</a>
  <span class="flove-mark flove-asterism">✺</span>
  <span class="flove-app-name">god(dess)</span>
  <span class="flove-spacer"></span>
  <span class="flove-tag">arquetipo &amp; matriz</span>
</div>

<div class="app">
    <header class="header">
        <div class="logo">
            <i class="fas fa-crown"></i>
            <span>God</span><strong>(dess)</strong>
        </div>
        <div class="menu-container">
            <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i> <span>Menu</span></button>
            <div class="dropdown" id="dropdownMenu">
                <a href="#" class="dropdown-item"><i class="fas fa-user-circle"></i> Profile</a>
                <a href="#" class="dropdown-item"><i class="fas fa-cog"></i> Settings</a>
                <a href="#" class="dropdown-item"><i class="fas fa-question-circle"></i> About</a>
                <hr style="margin:6px 0; border-color:#eee;">
                <button class="dropdown-item" id="insightMenuHint"><i class="fas fa-lightbulb"></i> Quick insight</button>
            </div>
        </div>
    </header>

    <div class="slogan">
        <i class="fas fa-eye"></i> who sees what
    </div>

    <!-- Interactive Matrix -->
    <div class="matrix-section">
        <div class="matrix-grid" id="matrixGrid">
            <div class="grid-cell" style="font-weight:300; color:#998ab0;"></div>
            <div class="grid-cell col-header">Goddess</div>
            <div class="grid-cell col-header">God</div>
            <div class="grid-cell col-header">Us</div>

            <div class="grid-cell row-header">Goddess</div>
            <div class="grid-cell data-cell" data-row="goddess" data-col="goddess"><i class="fas fa-check"></i></div>
            <div class="grid-cell data-cell" data-row="goddess" data-col="god"><i class="fas fa-check"></i></div>
            <div class="grid-cell data-cell" data-row="goddess" data-col="us"><i class="fas fa-check"></i></div>

            <div class="grid-cell row-header">God</div>
            <div class="grid-cell data-cell" data-row="god" data-col="goddess"><i class="fas fa-check"></i></div>
            <div class="grid-cell data-cell" data-row="god" data-col="god"><i class="fas fa-check"></i></div>
            <div class="grid-cell data-cell" data-row="god" data-col="us"><i class="fas fa-check"></i></div>

            <div class="grid-cell row-header">Us</div>
            <div class="grid-cell data-cell" data-row="us" data-col="goddess"><i class="fas fa-check"></i></div>
            <div class="grid-cell data-cell" data-row="us" data-col="god"><i class="fas fa-check"></i></div>
            <div class="grid-cell data-cell" data-row="us" data-col="us"><i class="fas fa-check"></i></div>
        </div>
        <div style="font-size:0.8rem; margin-top:6px; color:#6a5a7e; text-align:right;">
            <i class="fas fa-check-circle"></i> tap cells to select
        </div>
    </div>

    <!-- Action buttons: Save / Share / Publish (no copy, no preview card) -->
    <div class="button-group">
        <button class="btn" id="saveBtn"><i class="fas fa-download"></i> Save</button>
        <button class="btn" id="shareBtn"><i class="fas fa-share-alt"></i> Share</button>
        <button class="btn" id="publishBtn"><i class="fas fa-cloud-upload-alt"></i> Publish</button>
    </div>

    <!-- Insights + hint area -->
    <div class="insights-wrapper">
        <button class="insight-btn" id="insightsBtn"><i class="fas fa-brain"></i> Insights</button>
    </div>
    <div class="hint-area" id="hintMessage">
        Tap 'Insights' for hints about your selections.
    </div>
    <div class="footer-note">
        god(dess) · matrix of perception
    </div>
</div>

<script>
    (function(){
        "use strict";

        const rows = ['goddess', 'god', 'us'];
        const cols = ['goddess', 'god', 'us'];
        let selected = new Set();

        const cells = document.querySelectorAll('.data-cell');
        const hintMessage = document.getElementById('hintMessage');
        const dropdown = document.getElementById('dropdownMenu');
        const menuToggle = document.getElementById('menuToggle');
        const saveBtn = document.getElementById('saveBtn');
        const shareBtn = document.getElementById('shareBtn');
        const publishBtn = document.getElementById('publishBtn');
        const insightsBtn = document.getElementById('insightsBtn');
        const insightMenuHint = document.getElementById('insightMenuHint');

        function getKey(row, col) { return `${row}:${col}`; }

        function updateCellUI(cell) {
            cell.classList.toggle('selected', selected.has(getKey(cell.dataset.row, cell.dataset.col)));
        }

        function refreshAllCells() {
            cells.forEach(c => updateCellUI(c));
        }

        // Generate standalone matrix HTML (for save/share)
        function generateMatrixHTML() {
            const caps = s => s.charAt(0).toUpperCase() + s.slice(1);
            const rowHeaders = rows.map(caps);
            const colHeaders = cols.map(caps);
            let html = `<div style="display:grid; grid-template-columns:90px repeat(3,1fr); background:#fff; border-radius:28px; padding:10px 6px; border:1px solid #e4d9f2; font-family:system-ui, sans-serif;">`;
            // empty corner
            html += `<div style="padding:12px 4px;"></div>`;
            colHeaders.forEach(h => html += `<div style="font-weight:600; text-align:center; padding:12px 4px;">${h}</div>`);

            rows.forEach((r, idx) => {
                html += `<div style="font-weight:550; padding-left:16px; display:flex; align-items:center;">${rowHeaders[idx]}</div>`;
                cols.forEach(c => {
                    const key = getKey(r, c);
                    const isSelected = selected.has(key);
                    const bg = isSelected ? '#e9defa' : '#ffffffb3';
                    const border = isSelected ? '2px solid #a28cc2' : '1.5px solid #ede4fc';
                    const tick = isSelected ? '<i class="fas fa-check" style="font-size:1.5rem; color:#0e5e4f;"></i>' : '<i class="fas fa-check" style="opacity:0;"></i>';
                    html += `<div style="background:${bg}; border-radius:22px; margin:4px; padding:12px 4px; text-align:center; border:${border};">${tick}</div>`;
                });
            });
            html += '</div>';
            return html;
        }

        // Full HTML document for download
        function buildFullHTML() {
            const matrixHtml = generateMatrixHTML();
            return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>God(dess) Matrix</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"></head>
<body style="background:#f8f9fc; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:16px; font-family:system-ui;">
<div style="max-width:500px; width:100%;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
        <i class="fas fa-crown" style="font-size:2rem; color:#7c6a9c; background:#ede8f5; padding:10px; border-radius:18px;"></i>
        <span style="font-size:1.8rem;">God<strong style="background:linear-gradient(135deg,#4a3a6a,#2e3b4e); -webkit-background-clip:text; background-clip:text; color:transparent;">(dess)</strong></span>
    </div>
    <p style="font-size:1.3rem; color:#3a2e4e;"><i class="fas fa-eye"></i> who sees what</p>
    ${matrixHtml}
    <p style="margin-top:24px; color:#7a6a9e; text-align:center;">generated with God(dess) matrix</p>
</div>
</body></html>`;
        }

        // Cell toggle
        function toggleCell(cell) {
            const key = getKey(cell.dataset.row, cell.dataset.col);
            if (selected.has(key)) selected.delete(key);
            else selected.add(key);
            updateCellUI(cell);
        }

        cells.forEach(cell => {
            cell.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleCell(cell);
            });
        });

        // Menu dropdown
        function toggleDropdown(show) {
            if (show === undefined) dropdown.classList.toggle('show');
            else dropdown.classList[show ? 'add' : 'remove']('show');
        }
        menuToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });
        document.addEventListener('click', (e) => {
            if (!menuToggle.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show');
        });
        dropdown.addEventListener('click', (e) => e.stopPropagation());

        if (insightMenuHint) {
            insightMenuHint.addEventListener('click', () => {
                dropdown.classList.remove('show');
                showInsightHint();
            });
        }

        // Save: download HTML file
        saveBtn.addEventListener('click', () => {
            const htmlContent = buildFullHTML();
            const blob = new Blob([htmlContent], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'goddess_matrix.html';
            a.click();
            URL.revokeObjectURL(url);
            hintMessage.innerHTML = '<i class="fas fa-check-circle"></i> HTML file downloaded.';
        });

        // Share: use Web Share API if available, otherwise fallback
        shareBtn.addEventListener('click', async () => {
            const htmlContent = buildFullHTML();
            const blob = new Blob([htmlContent], {type: 'text/html'});
            const file = new File([blob], 'goddess_matrix.html', {type: 'text/html'});
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        title: 'God(dess) Matrix',
                        text: 'Check out my God(dess) perception matrix.',
                        files: [file]
                    });
                    hintMessage.innerHTML = '<i class="fas fa-share-alt"></i> Shared successfully!';
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        fallbackShare();
                    }
                }
            } else if (navigator.share) {
                // fallback to text share
                try {
                    await navigator.share({
                        title: 'God(dess) Matrix',
                        text: 'Matrix: ' + Array.from(selected).map(k => k.replace(':', '↔')).join(', ') || 'no selections'
                    });
                } catch {
                    fallbackShare();
                }
            } else {
                fallbackShare();
            }

            function fallbackShare() {
                hintMessage.innerHTML = '<i class="fas fa-info-circle"></i> Share not supported — saved file ready. Use Save button.';
                // optionally trigger download as fallback?
                // we can just copy a summary
                const summary = Array.from(selected).map(k => k.replace(':', '↔')).join(', ') || 'no selections';
                navigator.clipboard?.writeText(`God(dess) Matrix: ${summary}`).catch(()=>{});
            }
        });

        // Publish (simulated)
        publishBtn.addEventListener('click', () => {
            const count = selected.size;
            hintMessage.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Published! (${count} connection${count!==1?'s':''})`;
        });

        // Insights
        function showInsightHint() {
            const count = selected.size;
            let hint = '';
            if (count === 0) hint = '✨ Select cells to reveal connections.';
            else if (count <= 2) hint = '🔮 Few connections. Try the diagonal or cross relations.';
            else if (count <= 5) hint = '🌟 Interesting pattern emerging.';
            else if (count === 9) hint = '🌈 All-seeing! Every being perceives every being.';
            else hint = `🌀 You’ve mapped ${count} connections.`;

            if (selected.has('goddess:god') && selected.has('god:goddess')) hint += ' Mutual gaze.';
            if (selected.has('us:us')) hint += ' Self-awareness.';
            if (selected.has('goddess:goddess')) hint += ' Self-reflection of Goddess.';
            if (selected.has('god:god')) hint += ' Divine introspection.';
            hintMessage.innerHTML = `<i class="fas fa-lightbulb"></i> ${hint}`;
        }
        insightsBtn.addEventListener('click', showInsightHint);

        // Menu placeholders
        document.querySelectorAll('.dropdown-item[href="#"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                dropdown.classList.remove('show');
                hintMessage.innerHTML = `<i class="fas fa-info-circle"></i> ${link.textContent.trim()} — feature placeholder.`;
            });
        });

        // Optional: pre-select one cell for demonstration? keep clean.
        // selected.add('goddess:god'); refreshAllCells();
        refreshAllCells();
    })();
</script>

<a class="flove-footer-badge" href="index.html">
  <span class="flove-asterism flove-asterism--still">✺</span> all apps
</a>
</body>
</html>
