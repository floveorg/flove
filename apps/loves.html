<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>✺ flove · Lovely</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="flove.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0e14; --surface: #131c26; --surface-light: #1b2838;
      --primary: #a7f3d0; --primary-soft: #6ee7b7; --accent: #f0b5ff;
      --text: #f1f5f9; --text-muted: #94a3b8; --border: #2d3f54;
      --heart-empty: #ffffff; --heart-filled: #fb7185;
      --filter-merito: #fbbf24; --filter-recursos: #60a5fa; --filter-dinero: #f472b6;
      /* flove identity overrides — pink/mint Lovely */
      --app-accent:        #fb7185;
      --app-accent-soft:   #fecdd3;
      --app-ink-on-accent: #3a0a14;
    }
    body {
      background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      line-height: 1.45; min-height: 100vh; display: flex; flex-direction: column;
    }
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px 8px; background: rgba(10, 18, 28, 0.8);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20;
    }
    .logo-left { font-weight: 800; font-size: 1.6rem; background: linear-gradient(145deg, #e2f0ff, #b3d9ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-right: 8px; }
    .search-wrapper { flex: 1; display: flex; align-items: center; background: #1e2a39; border-radius: 30px; padding: 4px 6px; border: 1px solid #354b62; max-width: 200px; }
    .search-wrapper input { background: transparent; border: none; padding: 10px 8px; color: white; font-size: 0.9rem; width: 100%; outline: none; }
    .search-wrapper input::placeholder { color: #6b7f93; }
    .header-actions-right { display: flex; gap: 6px; margin-left: 8px; }
    .mini-btn { background: #1e3144; border: 1px solid #3a5670; color: var(--primary-soft); width: 42px; height: 42px; border-radius: 20px; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 0 #0f1a24; }
    .menu-btn { background: none; border: none; font-size: 26px; cursor: pointer; color: var(--text); padding: 6px; margin-left: 4px; position: relative; }
    .menu-dropdown { position: absolute; top: 55px; right: 16px; background: #172433; border: 1px solid #38506b; border-radius: 24px; padding: 12px 4px; box-shadow: 0 18px 30px #00000055; backdrop-filter: blur(8px); display: none; flex-direction: column; min-width: 160px; z-index: 30; }
    .menu-dropdown.show { display: flex; }
    .menu-item { padding: 12px 18px; color: #d3e0f0; font-weight: 500; border-radius: 40px; cursor: pointer; }

    .big-title { margin: 8px 16px 0; font-size: 2.2rem; font-weight: 700; text-align: center; background: linear-gradient(135deg, #f5e7c8, #b8d4ff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.02em; line-height: 1.2; word-break: break-word; }

    .categories-row { display: flex; justify-content: space-around; padding: 14px 6px 6px; gap: 4px; }
    .cat-icon { display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; padding: 12px 0; border-radius: 32px; min-width: 70px; border: 1.5px solid transparent; transition: 0.15s; }
    .cat-icon.active { background: #1e3144; border-color: var(--primary-soft); }
    .cat-emoji { font-size: 34px; line-height: 1; }

    .action-panel { background: var(--surface-light); margin: 8px 12px 12px; border-radius: 32px; padding: 18px 14px; border: 1px solid #2f4763; box-shadow: 0 12px 28px rgba(0,0,0,0.5); flex: 1; }

    .tabs-filters-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; border-bottom: 1px solid #334f6a; padding-bottom: 8px; }
    .tabs-left { display: flex; gap: 6px; }
    .tab-pill { background: transparent; border: 1.5px solid #3f5e7c; color: #cbd5e1; width: 40px; height: 40px; border-radius: 30px; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .tab-pill.active { background: var(--primary); border-color: var(--primary); color: #082022; }
    .filters-right { display: flex; gap: 10px; }
    .filter-chip { width: 42px; height: 42px; border-radius: 16px; background: #172837; border: 2px solid #2e4a64; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; cursor: pointer; color: #b9c8dd; box-shadow: 0 3px 0 #0f1a24; }
    .filter-chip.merito.active { background: var(--filter-merito); border-color: #fcd34d; color: #1e1b0c; }
    .filter-chip.recursos.active { background: var(--filter-recursos); border-color: #93c5fd; color: #0c1a2b; }
    .filter-chip.dinero.active { background: var(--filter-dinero); border-color: #f9a8d4; color: #2b101c; }

    .suggestions-list { display: flex; flex-direction: column; gap: 10px; max-height: 240px; overflow-y: auto; padding-right: 4px; margin-bottom: 14px; }
    .suggestion-item { background: #0f1d2d; border-radius: 22px; padding: 10px 12px 10px 16px; border: 1px solid #2f4a63; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .item-text { flex: 1; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
    .reward-badge { display: inline-flex; gap: 4px; margin-left: 4px; }
    .reward-icon { font-size: 18px; cursor: default; }
    .heart-btn { background: transparent; border: none; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 28px; padding: 0; flex-shrink: 0; }
    .heart-btn::before { content: "🤍"; }
    .heart-btn.liked { color: var(--heart-filled); transform: scale(1.1); text-shadow: 0 0 12px #fb7185; }
    .heart-btn.liked::before { content: "❤️"; }

    .add-section { margin-top: 6px; }
    .add-input-row { margin-bottom: 8px; }
    .add-input { width: 100%; background: #0c1a28; border: 1.5px solid #34526e; border-radius: 40px; padding: 12px 16px; color: white; font-size: 0.9rem; }
    .add-buttons-row { display: flex; gap: 8px; align-items: center; position: relative; }
    .icon-only-btn { background: #1b3043; border: 1px solid #3f6082; color: white; border-radius: 40px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; box-shadow: 0 3px 0 #0e1c2a; padding: 0; }
    .icon-only-btn.primary { background: var(--primary); border-color: #8ef0bf; color: #021c1a; }
    .icon-only-btn.recording { background: #fb7185; animation: pulse 1.5s infinite; }
    .spacer { flex: 1; }
    .reward-options { display: none; gap: 6px; background: #1a2a3b; padding: 6px 8px; border-radius: 30px; border: 1px solid #3f6082; }
    .reward-options.show { display: flex; }
    .reward-option-btn { background: transparent; border: none; font-size: 24px; padding: 6px; cursor: pointer; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 #fb7185aa; } 70% { box-shadow: 0 0 0 10px #fb718500; } 100% { box-shadow: 0 0 0 0 #fb718500; } }

    .wide-action-buttons { display: flex; gap: 6px; margin: 16px 12px 8px; }
    .wide-btn { background: #1b3142; border: 1px solid #3d5f7e; color: #e5edf5; flex: 1; height: 56px; border-radius: 30px; font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 0 #0e1c2a; }

    .global-selected-footer { margin: 4px 12px 10px; padding: 16px 18px; background: #122233; border-radius: 28px; font-size: 0.95rem; color: #d6e5ff; border-left: 6px solid var(--primary); word-break: break-word; box-shadow: inset 0 0 0 1px #2e4b66; white-space: pre-line; line-height: 1.6; }
    .action-feedback { text-align: center; font-size: 0.8rem; color: var(--primary-soft); margin-top: 4px; min-height: 24px; }
    .tiny-footer { text-align: center; font-size: 0.7rem; color: #5f7f9a; margin: 6px 0 12px; }
    .suggestions-list::-webkit-scrollbar { width: 4px; }
    .suggestions-list::-webkit-scrollbar-thumb { background: #3b6285; border-radius: 10px; }
  </style>
</head>
<body>

<div class="flove-bar flove-bar--dark">
  <a class="flove-home" href="index.html">←</a>
  <span class="flove-mark flove-asterism">✺</span>
  <span class="flove-app-name">lovely</span>
  <span class="flove-spacer"></span>
  <span class="flove-tag">actos de amor</span>
</div>

<header class="app-header">
  <div class="logo-left" title="Inicio">✺ lovely</div>
  <div class="search-wrapper">
    <input type="search" placeholder="buscar..." id="searchInput" title="Buscar">
  </div>
  <div class="header-actions-right">
    <button class="mini-btn" id="goBtn" title="Filtrar">go</button>
    <button class="mini-btn" id="headerAddTitleBtn" title="Título">add</button>
  </div>
  <div class="menu-container">
    <button class="menu-btn" id="menuToggle" title="Menú">☰</button>
    <div class="menu-dropdown" id="menuDropdown">
      <div class="menu-item" title="Listas">📋 Mis listas</div>
      <div class="menu-item" title="Estadísticas">📊 Estadísticas</div>
      <div class="menu-item" title="Inspiración">💡 Inspiración</div>
      <div class="menu-item" title="Soporte">🛟 Soporte</div>
      <div class="menu-item" title="Ajustes">⚙️ Ajustes</div>
    </div>
  </div>
</header>

<div id="dynamicTitle" class="big-title"></div>

<div class="categories-row" id="categoriesRow">
  <div class="cat-icon active" data-cat="palabras" title="Afirmar"><span class="cat-emoji">💬</span></div>
  <div class="cat-icon" data-cat="tiempo" title="Calidad"><span class="cat-emoji">🕰️</span></div>
  <div class="cat-icon" data-cat="servicio" title="Servicio"><span class="cat-emoji">🛠️</span></div>
  <div class="cat-icon" data-cat="regalos" title="Regalos"><span class="cat-emoji">🎁</span></div>
  <div class="cat-icon" data-cat="contacto" title="Contacto"><span class="cat-emoji">🤝</span></div>
</div>

<div class="action-panel" id="actionPanel">
  <div class="tabs-filters-row">
    <div class="tabs-left">
      <button class="tab-pill active" data-tab="cercanos" title="Cercanos">👥</button>
      <button class="tab-pill" data-tab="comunidades" title="Comunidad">🏘️</button>
      <button class="tab-pill" data-tab="todos" title="Todos">🌐</button>
    </div>
    <div class="filters-right">
      <div class="filter-chip merito" id="filterMerito" title="Mérito">★</div>
      <div class="filter-chip recursos" id="filterRecursos" title="Recursos">⛁</div>
      <div class="filter-chip dinero" id="filterDinero" title="Dinero">€</div>
    </div>
  </div>

  <div class="suggestions-list" id="suggestionsList"></div>
  <div id="actionFeedback" class="action-feedback"></div>

  <div class="add-section">
    <div class="add-input-row">
      <input type="text" class="add-input" id="newSuggestionInput" placeholder="nueva acción..." title="Escribir">
    </div>
    <div class="add-buttons-row">
      <button class="icon-only-btn" id="recordVoiceIconBtn" title="Grabar">🎤</button>
      <button class="icon-only-btn" id="videoRecordBtn" title="Video">📹</button>
      <button class="icon-only-btn primary" id="magicSuggestBtn" title="Sugerir">✨</button>
      <div style="position:relative; display:flex; align-items:center;">
        <button class="icon-only-btn" id="rewardBtn" title="Premio">🏆</button>
        <div class="reward-options" id="rewardOptions">
          <button class="reward-option-btn" data-reward="merito" title="Mérito">★</button>
          <button class="reward-option-btn" data-reward="recursos" title="Recursos">⛁</button>
          <button class="reward-option-btn" data-reward="dinero" title="Dinero">€</button>
        </div>
      </div>
      <span class="spacer"></span>
      <button class="icon-only-btn" id="addPlusBtn" title="Añadir">➕</button>
    </div>
  </div>
</div>

<div class="wide-action-buttons">
  <button class="wide-btn" id="copyBtn" title="Copiar">📋</button>
  <button class="wide-btn" id="shareBtn" title="Compartir">📤</button>
  <button class="wide-btn" id="magicBtn" title="Magia">✨</button>
  <button class="wide-btn" id="publishBtn" title="Publicar">🚀</button>
</div>

<div class="global-selected-footer" id="globalSelectedPhrase">❤️ Selecciona acciones con el corazón</div>
<div class="tiny-footer">ama, ama y ensancha el alma · mérito / recursos / €</div>
<input type="file" id="videoFileInput" accept="video/*" style="display:none">

<script>
  (function(){
    const baseData = {
      palabras: { cercanos: [{text:"Audio de ánimo sincero",liked:false,merito:true,recursos:false,dinero:false, rewards:[]}], comunidades: [{text:"Hilo de reconocimiento",liked:false,merito:true,recursos:true,dinero:false, rewards:[]}], todos: [{text:"Feedback útil en post",liked:false,merito:true,recursos:false,dinero:false, rewards:[]}] },
      tiempo: { cercanos: [{text:"20' videollamada sin pantallas",liked:false,merito:false,recursos:true,dinero:false, rewards:[]}], comunidades: [{text:"Club de lectura",liked:false,merito:false,recursos:true,dinero:false, rewards:[]}], todos: [{text:"Cafecito virtual",liked:false,merito:false,recursos:true,dinero:false, rewards:[]}] },
      servicio: { cercanos: [{text:"Arreglar bici/PC",liked:false,merito:true,recursos:true,dinero:false, rewards:[]}], comunidades: [{text:"Jornada mantención",liked:false,merito:true,recursos:true,dinero:false, rewards:[]}], todos: [{text:"Revisar CV",liked:false,merito:true,recursos:true,dinero:true, rewards:[]}] },
      regalos: { cercanos: [{text:"Regalar cosas sin uso",liked:false,merito:false,recursos:true,dinero:false, rewards:[]}], comunidades: [{text:"Subasta solidaria",liked:false,merito:true,recursos:true,dinero:true, rewards:[]}], todos: [{text:"Donar ebook",liked:false,merito:true,recursos:true,dinero:false, rewards:[]}] },
      contacto: { cercanos: [{text:"Abrazo con permiso",liked:false,merito:true,recursos:false,dinero:false, rewards:[]}], comunidades: [{text:"Zona opt-in abrazos",liked:false,merito:true,recursos:true,dinero:false, rewards:[]}], todos: [{text:"Saludo choque manos",liked:false,merito:false,recursos:false,dinero:false, rewards:[]}] }
    };
    let liveData = JSON.parse(JSON.stringify(baseData));
    let currentCategory = 'palabras', currentTab = 'cercanos';
    let activeFilters = { merito: false, recursos: false, dinero: false };
    let currentSearchTerm = '';
    let pendingRewardType = null;
    let rewardMode = false;
    let dynamicTitleText = '';

    const catIcons = document.querySelectorAll('.cat-icon'), tabs = document.querySelectorAll('.tab-pill');
    const suggestionsList = document.getElementById('suggestionsList'), globalPhraseEl = document.getElementById('globalSelectedPhrase');
    const newInput = document.getElementById('newSuggestionInput'), addPlusBtn = document.getElementById('addPlusBtn');
    const recordBtn = document.getElementById('recordVoiceIconBtn'), videoBtn = document.getElementById('videoRecordBtn');
    const magicSuggestBtn = document.getElementById('magicSuggestBtn'), rewardBtn = document.getElementById('rewardBtn');
    const copyBtn = document.getElementById('copyBtn'), shareBtn = document.getElementById('shareBtn'), magicBtn = document.getElementById('magicBtn'), publishBtn = document.getElementById('publishBtn');
    const searchInput = document.getElementById('searchInput'), goBtn = document.getElementById('goBtn'), headerAddTitleBtn = document.getElementById('headerAddTitleBtn');
    const filterMerito = document.getElementById('filterMerito'), filterRecursos = document.getElementById('filterRecursos'), filterDinero = document.getElementById('filterDinero');
    const dynamicTitle = document.getElementById('dynamicTitle'), actionFeedback = document.getElementById('actionFeedback');
    const menuToggle = document.getElementById('menuToggle'), menuDropdown = document.getElementById('menuDropdown');
    const videoFileInput = document.getElementById('videoFileInput');
    const rewardOptionsDiv = document.getElementById('rewardOptions');

    function showFeedback(text) { actionFeedback.textContent = text; setTimeout(()=> actionFeedback.textContent='', 1500); }
    
    function renderRewardIcons(rewards) {
      return (rewards || []).map(r => `<span class="reward-icon" title="${escapeHtml(r.note || 'Recompensa')}">${r.type==='merito'?'★':r.type==='recursos'?'⛁':'€'}</span>`).join('');
    }

    function updateGlobalPhrase() {
      const allLiked = [];
      for (const cat in liveData) for (const tab in liveData[cat]) liveData[cat][tab].forEach(i => { if(i.liked) allLiked.push(i); });
      if (allLiked.length === 0) {
        globalPhraseEl.innerHTML = '❤️ Selecciona acciones con el corazón';
      } else {
        globalPhraseEl.innerHTML = allLiked.map(item => 
          `❤️ ${escapeHtml(item.text)} ${renderRewardIcons(item.rewards)}`
        ).join('<br>');
      }
    }

    function filterItems(items) {
      let filtered = items;
      if (activeFilters.merito || activeFilters.recursos || activeFilters.dinero) filtered = filtered.filter(i => (!activeFilters.merito || i.merito) && (!activeFilters.recursos || i.recursos) && (!activeFilters.dinero || i.dinero));
      if (currentSearchTerm.trim()) filtered = filtered.filter(i => i.text.toLowerCase().includes(currentSearchTerm.trim().toLowerCase()));
      return filtered;
    }

    function render() {
      const allItems = liveData[currentCategory][currentTab];
      const filtered = filterItems(allItems);
      let html = '';
      filtered.forEach((item) => {
        const origIdx = allItems.indexOf(item);
        const rewardIcons = renderRewardIcons(item.rewards);
        html += `<div class="suggestion-item"><span class="item-text">${escapeHtml(item.text)}<span class="reward-badge">${rewardIcons}</span></span><button class="heart-btn ${item.liked?'liked':''}" data-idx="${origIdx}"></button></div>`;
      });
      suggestionsList.innerHTML = html || '<div class="suggestion-item">✨ No hay acciones</div>';
      document.querySelectorAll('.heart-btn').forEach(btn => btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const idx = this.dataset.idx;
        if(idx!==undefined) { liveData[currentCategory][currentTab][idx].liked = !liveData[currentCategory][currentTab][idx].liked; render(); }
      }));
      updateGlobalPhrase();
    }

    function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    function setActiveCategory(cat) { currentCategory=cat; catIcons.forEach(ic=>ic.classList.toggle('active', ic.dataset.cat===cat)); render(); }
    function setActiveTab(tab) { currentTab=tab; tabs.forEach(t=>t.classList.toggle('active', t.dataset.tab===tab)); render(); }

    function addSuggestion(text) {
      if(!text.trim()) return;
      liveData[currentCategory][currentTab].push({text: text.trim(), liked:false, merito:false, recursos:false, dinero:false, rewards:[]});
      newInput.value=''; render();
    }

    // 真实语音识别
    let recognition = null;
    function initSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Tu navegador no soporta reconocimiento de voz.'); return null; }
      const rec = new SR(); rec.continuous = false; rec.interimResults = false; rec.lang = 'es-ES';
      return rec;
    }
    recordBtn.addEventListener('click', ()=>{
      if (!recognition) { recognition = initSpeech(); if (!recognition) return; }
      if (recordBtn.classList.contains('recording')) {
        recognition.stop();
      } else {
        recognition.start();
        recordBtn.classList.add('recording'); recordBtn.textContent = '🔴';
        showFeedback('🎤 Grabando…');
      }
    });
    if (window.SpeechRecognition || window.webkitSpeechRecognition) {
      recognition = initSpeech();
      if(recognition) {
        recognition.onresult = (e) => { newInput.value = e.results[0][0].transcript; showFeedback('✅ Voz transcrita'); };
        recognition.onend = () => { recordBtn.classList.remove('recording'); recordBtn.textContent = '🎤'; };
        recognition.onerror = () => { recordBtn.classList.remove('recording'); recordBtn.textContent = '🎤'; showFeedback('❌ Error de voz'); };
      }
    }

    // 奖励
    rewardBtn.addEventListener('click', (e)=>{
      e.stopPropagation();
      rewardOptionsDiv.classList.toggle('show');
      showFeedback('Premio: elige tipo');
    });
    document.querySelectorAll('.reward-option-btn').forEach(btn => {
      btn.addEventListener('click', (e)=>{
        pendingRewardType = e.currentTarget.dataset.reward;
        rewardOptionsDiv.classList.remove('show');
        newInput.placeholder = 'Escribe la nota de recompensa…';
        newInput.value = '';
        newInput.focus();
        rewardMode = true;
        addPlusBtn.style.background = '#fbbf24';
        addPlusBtn.title = 'Confirmar recompensa';
        showFeedback(`Recompensa ${pendingRewardType} · Escribe nota`);
      });
    });
    document.addEventListener('click', (e)=>{ if(!rewardBtn.contains(e.target) && !rewardOptionsDiv.contains(e.target)) rewardOptionsDiv.classList.remove('show'); });

    addPlusBtn.addEventListener('click', ()=>{
      if(rewardMode && pendingRewardType) {
        const note = newInput.value.trim() || 'Recompensa';
        const items = liveData[currentCategory][currentTab];
        let applied = 0;
        items.forEach(item => { if(item.liked) { if(!item.rewards) item.rewards = []; item.rewards.push({type: pendingRewardType, note}); applied++; }});
        if(applied===0) alert('Selecciona al menos una acción con ❤️');
        else { render(); showFeedback(`✅ ${applied} recompensa(s) añadida(s)`); }
        rewardMode = false; pendingRewardType = null;
        newInput.placeholder = 'nueva acción...'; newInput.value = '';
        addPlusBtn.style.background = ''; addPlusBtn.title = 'Añadir';
      } else {
        addSuggestion(newInput.value);
        showFeedback('➕ Acción añadida');
      }
    });

    videoBtn.addEventListener('click', ()=>{ videoFileInput.click(); showFeedback('📹 Selecciona video'); });
    videoFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if(file) { newInput.value = `📹 Video: ${file.name}`; showFeedback(`Video listo: ${file.name}`); }
      videoFileInput.value = '';
    });

    magicSuggestBtn.addEventListener('click', ()=>{
      const suggestions = { palabras:'Elogiar con entusiasmo', tiempo:'Caminata consciente', servicio:'Ayudar a instalar app', regalos:'Regalar una planta', contacto:'Chocar los cinco' };
      newInput.value = suggestions[currentCategory] || 'Nueva acción sugerida ✨';
      showFeedback(`✨ Idea para ${currentCategory}`);
    });

    // 分享：调用系统分享面板
    shareBtn.addEventListener('click', ()=>{
      const likedItems = [];
      for (const cat in liveData) for (const tab in liveData[cat]) liveData[cat][tab].forEach(i => { if(i.liked) likedItems.push(i); });
      const titleSuffix = dynamicTitleText ? ` · ${dynamicTitleText}` : '';
      const html = `
        <div style="font-family:sans;background:#0f1e2c;color:#eef;padding:20px;border-radius:24px">
          <h2 style="color:#a7f3d0">✨ Lovely${titleSuffix}</h2>
          <div style="margin-top:16px;">
            ${likedItems.length ? likedItems.map(item => 
              `<div style="margin-bottom:8px;">❤️ ${escapeHtml(item.text)} ${renderRewardIcons(item.rewards)}</div>`
            ).join('') : '<p>Sin selección</p>'}
          </div>
          <p style="margin-top:20px;">— con amor, Lovely</p>
        </div>`;
      if(navigator.share) {
        navigator.share({
          title: 'Lovely Actions',
          text: 'Mira estas acciones bonitas',
          files: [new File([html], 'lovely-card.html', { type: 'text/html' })]
        }).catch(() => {
          // fallback
          const w = window.open('', '_blank');
          w.document.write(html);
          w.document.close();
        });
      } else {
        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
      }
      showFeedback('📤 Compartiendo…');
    });

    // 魔法组合：每次使用不同介词且不重复
    const prepositionPool = [' y ', ' con ', ' para ', ' junto a ', ' mediante ', ' gracias a ', ' en torno a ', ' a través de ', ' inspirado por '];
    let availablePreps = [...prepositionPool];
    function magicCombine(){
      const likedItems = [];
      for (const cat in liveData) for (const tab in liveData[cat]) liveData[cat][tab].forEach(i => { if(i.liked) likedItems.push(i); });
      if(likedItems.length < 2) { alert('Selecciona al menos dos'); return; }
      
      if (availablePreps.length === 0) availablePreps = [...prepositionPool];
      let combined = likedItems[0].text;
      for (let i=1; i<likedItems.length; i++) {
        const randomIndex = Math.floor(Math.random() * availablePreps.length);
        const prep = availablePreps.splice(randomIndex, 1)[0];
        combined += prep + likedItems[i].text;
      }
      // 显示组合结果（不带奖励图标，因为短语区需要简洁）
      globalPhraseEl.innerHTML = `✨ ${escapeHtml(combined)}`;
      showFeedback('✨ Magia combinada');
    }

    headerAddTitleBtn.addEventListener('click', ()=>{
      dynamicTitleText = searchInput.value.trim();
      dynamicTitle.textContent = dynamicTitleText;
      showFeedback(`Título: ${dynamicTitleText || 'borrado'}`);
    });

    const allButtons = document.querySelectorAll('button, .cat-icon, .tab-pill, .filter-chip, .mini-btn');
    allButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        const title = btn.getAttribute('title') || btn.textContent.trim() || 'acción';
        if(!btn.id.includes('reward') && !btn.id.includes('addPlus')) showFeedback(title);
      });
    });

    menuToggle.addEventListener('click', e=>{ e.stopPropagation(); menuDropdown.classList.toggle('show'); });
    document.addEventListener('click', e=>{ if(!menuToggle.contains(e.target)&&!menuDropdown.contains(e.target)) menuDropdown.classList.remove('show'); });
    filterMerito.addEventListener('click',()=>{ filterMerito.classList.toggle('active'); activeFilters.merito=!activeFilters.merito; render(); });
    filterRecursos.addEventListener('click',()=>{ filterRecursos.classList.toggle('active'); activeFilters.recursos=!activeFilters.recursos; render(); });
    filterDinero.addEventListener('click',()=>{ filterDinero.classList.toggle('active'); activeFilters.dinero=!activeFilters.dinero; render(); });
    goBtn.addEventListener('click', ()=>{ currentSearchTerm = searchInput.value; render(); });
    catIcons.forEach(ic=>ic.addEventListener('click', ()=>setActiveCategory(ic.dataset.cat)));
    tabs.forEach(t=>t.addEventListener('click', ()=>setActiveTab(t.dataset.tab)));
    copyBtn.addEventListener('click', ()=>{ navigator.clipboard?.writeText(globalPhraseEl.innerText).then(()=>showFeedback('📋 Copiado')); });
    magicBtn.addEventListener('click', magicCombine);
    publishBtn.addEventListener('click', ()=>{ showFeedback('🚀 Publicado'); });

    setActiveCategory('palabras'); setActiveTab('cercanos');
  })();
</script>

<a class="flove-footer-badge flove-footer-badge--dark" href="index.html">
  <span class="flove-asterism flove-asterism--still">✺</span> all apps
</a>
