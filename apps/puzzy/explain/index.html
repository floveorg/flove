<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>✺ flove · Puzzy — Explain</title>
  <link rel="stylesheet" href="../../flove.css">
  <style>
    :root{
      /* flove identity overrides — Puzzy: violet accent, teal flourish, on a deep canvas */
      --app-accent:        #8d89ff;
      --app-accent-soft:   #c9c6ff;
      --app-ink-on-accent: #0b0b14;

      /* Puzzy local palette (dark) */
      --bg:#0b0b0f; --panel:#11131a; --ink:#e9eaf2; --muted:#a3a7b4;
      --line:#1e2133; --field:#13162a; --accent2:#70f0d3;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--ink);
      background:
        radial-gradient(1000px 700px at 110% -10%, rgba(141,137,255,.16), transparent 60%),
        radial-gradient(800px 600px at -10% 120%, rgba(112,240,211,.12), transparent 50%),
        var(--bg);
      font-family:var(--flove-font-ui); letter-spacing:.2px;
    }

    /* i18n — pure CSS (§13.2) */
    .t-es{ display:none }
    body:has(#ui-lang-es:checked) .t-en{ display:none }
    body:has(#ui-lang-es:checked) .t-es{ display:inline }

    /* language toggle inside the flove-bar */
    .lang{ display:inline-flex; gap:2px; margin-left:auto }
    .lang input{ position:absolute; opacity:0; pointer-events:none }
    .lang label{
      font-size:11px; font-weight:600; letter-spacing:.4px; padding:3px 9px;
      border-radius:var(--flove-radius-pill); cursor:pointer; color:var(--muted);
      border:1px solid transparent;
    }
    #ui-lang-en:checked ~ label[for=ui-lang-en],
    #ui-lang-es:checked ~ label[for=ui-lang-es]{
      color:var(--app-ink-on-accent); background:var(--app-accent); border-color:var(--app-accent);
    }

    /* background veil — brightens one notch with every step completed */
    .bg-veil{
      position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0;
      background:
        radial-gradient(1200px 800px at 50% -10%, rgba(201,198,255,.20), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      transition:opacity .7s var(--flove-ease);
    }
    body:has(#step-1:checked) .bg-veil{ opacity:0 }
    body:has(#step-2:checked) .bg-veil{ opacity:.34 }
    body:has(#step-3:checked) .bg-veil{ opacity:.67 }
    body:has(#step-4:checked) .bg-veil{ opacity:1 }

    /* ── stepper · standard flove stepnav (§13) — lives at the BOTTOM,
       dots only (no section titles). Earlier steps read as "done", the
       current as "active". Pure CSS, no JS. */
    .step-radio{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none }

    .step-footer{
      max-width:980px; margin:.4rem auto 3rem; padding:0 1rem;
      display:flex; flex-direction:column; align-items:center; gap:1.1rem;
    }
    .stepnav{
      display:flex; align-items:flex-start; justify-content:center; gap:0;
      width:100%; max-width:440px;
    }
    .stepnav-node{
      position:relative; flex:1 1 0; max-width:190px;
      display:flex; justify-content:center; padding:0 .3rem; cursor:pointer;
    }
    /* connector line between adjacent nodes */
    .stepnav-node:not(:last-child)::after{
      content:""; position:absolute; top:16px; left:calc(50% + 18px);
      width:calc(100% - 36px); height:2px; background:var(--line);
      transition:background var(--flove-fast);
    }
    .stepnav-dot{
      width:34px; height:34px; border-radius:50%; z-index:1;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:.9rem;
      color:var(--muted); background:var(--panel); border:2px solid var(--line);
      transition:color var(--flove-fast), background var(--flove-fast),
                 border-color var(--flove-fast), box-shadow var(--flove-fast), transform var(--flove-fast);
    }
    .stepnav-node:hover .stepnav-dot{ border-color:var(--app-accent); color:var(--ink) }
    .stepnav-node:focus-visible{ outline:none }
    .stepnav-node:focus-visible .stepnav-dot{ box-shadow:0 0 0 3px rgba(141,137,255,.4) }

    /* active step */
    body:has(#step-1:checked) .stepnav-node[for=step-1] .stepnav-dot,
    body:has(#step-2:checked) .stepnav-node[for=step-2] .stepnav-dot,
    body:has(#step-3:checked) .stepnav-node[for=step-3] .stepnav-dot,
    body:has(#step-4:checked) .stepnav-node[for=step-4] .stepnav-dot{
      color:var(--app-ink-on-accent); background:var(--app-accent);
      border-color:var(--app-accent); transform:scale(1.08);
      box-shadow:0 0 0 4px rgba(141,137,255,.22);
    }

    /* completed steps (those before the active one) + filled connectors */
    body:has(#step-2:checked) .stepnav-node[for=step-1] .stepnav-dot,
    body:has(#step-3:checked) .stepnav-node[for=step-1] .stepnav-dot,
    body:has(#step-3:checked) .stepnav-node[for=step-2] .stepnav-dot,
    body:has(#step-4:checked) .stepnav-node[for=step-1] .stepnav-dot,
    body:has(#step-4:checked) .stepnav-node[for=step-2] .stepnav-dot,
    body:has(#step-4:checked) .stepnav-node[for=step-3] .stepnav-dot{
      color:var(--app-accent); background:rgba(141,137,255,.14); border-color:var(--app-accent);
    }
    body:has(#step-2:checked) .stepnav-node[for=step-1]::after,
    body:has(#step-3:checked) .stepnav-node[for=step-1]::after,
    body:has(#step-3:checked) .stepnav-node[for=step-2]::after,
    body:has(#step-4:checked) .stepnav-node[for=step-1]::after,
    body:has(#step-4:checked) .stepnav-node[for=step-2]::after,
    body:has(#step-4:checked) .stepnav-node[for=step-3]::after{
      background:var(--app-accent);
    }

    /* centred Back / Next — only the active step's pair shows */
    .step-controls{ display:flex; justify-content:center }
    .step-ctl{ display:none; gap:.6rem; align-items:center; justify-content:center }
    body:has(#step-1:checked) .step-ctl--1,
    body:has(#step-2:checked) .step-ctl--2,
    body:has(#step-3:checked) .step-ctl--3,
    body:has(#step-4:checked) .step-ctl--4{ display:flex }
    .step-btn{
      display:inline-flex; align-items:center; gap:.4rem; cursor:pointer;
      border-radius:var(--flove-radius-pill); padding:.5rem 1.2rem;
      font:inherit; font-size:.9rem; font-weight:600; color:var(--ink);
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      transition:border-color var(--flove-fast), box-shadow var(--flove-fast), background var(--flove-fast);
    }
    .step-btn:hover{ border-color:var(--app-accent) }
    .step-btn--next{ background:var(--app-accent); color:var(--app-ink-on-accent); border-color:var(--app-accent) }
    .step-btn--next:hover{ box-shadow:0 0 14px rgba(141,137,255,.45) }

    /* ── panels — one section at a time ───────────────────────── */
    .shell{ max-width:980px; margin:.9rem auto 1.4rem; padding:0 1rem }
    .pack{
      display:none;
      border:1px solid var(--line); border-radius:var(--flove-radius);
      padding:1.1rem 1.2rem 1.2rem;
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      animation:fade .3s var(--flove-ease) both;
    }
    @keyframes fade{ from{opacity:0; transform:translateY(.4rem)} to{opacity:1; transform:none} }
    body:has(#step-1:checked) .pack--1,
    body:has(#step-2:checked) .pack--2,
    body:has(#step-3:checked) .pack--3,
    body:has(#step-4:checked) .pack--4{ display:block }

    .pack h2{ margin:.1rem 0 .8rem; font-size:1.05rem; letter-spacing:.6px; color:var(--accent2) }
    .pack h3{ margin:1rem 0 .5rem; font-size:.95rem; letter-spacing:.6px; color:var(--app-accent) }

    /* fields */
    .field{ display:block }
    .lbl{ display:block; font-weight:600; font-size:.9rem; margin:0 0 .3rem; color:var(--muted) }
    input[type=text], textarea, select{
      width:100%; background:var(--field); color:var(--ink);
      border:1px solid var(--line); border-radius:var(--flove-radius-sm);
      padding:.6rem .7rem; font:inherit;
    }
    textarea{ resize:vertical }
    input[type=text]:focus, textarea:focus, select:focus{
      outline:none; border-color:var(--app-accent);
      box-shadow:0 0 0 3px rgba(141,137,255,.18);
    }
    .grid{ display:grid; gap:.7rem }
    .grid--two{ grid-template-columns:repeat(2,minmax(0,1fr)) }
    @media (max-width:760px){ .grid--two{ grid-template-columns:1fr } }

    /* chips / choice bars */
    fieldset.field{ border:1px solid var(--line); border-radius:var(--flove-radius-sm); padding:.7rem .8rem; margin:0 0 .7rem }
    legend.lbl{ padding:0 .35rem }
    .chips{ display:flex; gap:.4rem; flex-wrap:wrap }
    /* the inputs are hidden — the whole label is the (toggle) button */
    .chips input, .bar__choices input{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none }
    .chips label, .bar__choices label{
      display:inline-flex; align-items:center; cursor:pointer; user-select:none;
      padding:.4rem .85rem; border-radius:var(--flove-radius-pill);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
      border:1px solid var(--line); font-size:.9rem; color:var(--ink);
      transition:border-color var(--flove-fast), background var(--flove-fast), box-shadow var(--flove-fast), color var(--flove-fast);
    }
    .chips label:hover, .bar__choices label:hover{ border-color:var(--app-accent) }
    .chips label:has(input:checked), .bar__choices label:has(input:checked){
      background:var(--app-accent); color:var(--app-ink-on-accent);
      border-color:var(--app-accent); box-shadow:0 0 10px rgba(141,137,255,.35);
    }
    .bar__scale{ color:var(--muted); font-size:.85rem; margin:.2rem 0 .3rem }
    .bar__choices{ display:flex; gap:.5rem; flex-wrap:wrap }

    /* formalise funnel */
    .funnel{ display:grid; gap:.6rem }
    .funnel__band{
      background:conic-gradient(from -45deg at 15% 50%, rgba(141,137,255,.14), transparent 30%), #15182b;
      border:1px solid var(--line); border-radius:var(--flove-radius-sm); padding:.6rem .7rem;
    }
    .evidence{ border:1px dashed var(--line); border-radius:var(--flove-radius-sm); padding:.7rem; background:var(--field) }

    /* know more */
    .output{ max-width:980px; margin:0 auto 5rem; padding:0 1rem }
    .output summary{ cursor:pointer; color:var(--muted) }
    .output__box{ border:1px solid var(--line); border-radius:var(--flove-radius-sm); padding:.7rem; background:#111426; margin-top:.5rem }
    .output a{ color:var(--accent2) }
  </style>
</head>
<body>
  <div class="bg-veil" aria-hidden="true"></div>

  <!-- language radios (drive the pure-CSS i18n) -->
  <nav class="flove-bar flove-bar--dark">
    <a class="flove-home" href="../../index.html">← <span class="t-en">Apps</span><span class="t-es">Apps</span></a>
    <span class="flove-mark flove-asterism" aria-hidden="true">✺</span>
    <span class="flove-app-name">Puzzy</span>
    <span class="flove-tag">Explain</span>
    <span class="lang">
      <input type="radio" name="ui-lang" id="ui-lang-en" checked>
      <input type="radio" name="ui-lang" id="ui-lang-es">
      <label for="ui-lang-en">EN</label>
      <label for="ui-lang-es">ES</label>
    </span>
  </nav>

  <!-- step radios (drive the pure-CSS stepper) -->
  <input type="radio" name="step" id="step-1" class="step-radio" checked>
  <input type="radio" name="step" id="step-2" class="step-radio">
  <input type="radio" name="step" id="step-3" class="step-radio">
  <input type="radio" name="step" id="step-4" class="step-radio">

  <main class="shell">
    <!-- PACK 1 · ESSENTIAL -->
    <section class="pack pack--1">
      <h2><span class="t-en">Essential</span><span class="t-es">Esencial</span></h2>
      <label class="field">
        <span class="lbl"><span class="t-en">Object</span><span class="t-es">Objeto</span></span>
        <input type="text" autofocus placeholder="Name an OBJECT here — e.g. True Love, Bike, Oxymorons…">
      </label>
    </section>

    <!-- PACK 2 · PERSPECTIVE + FOCUS -->
    <section class="pack pack--2">
      <h2><span class="t-en">Perspective</span><span class="t-es">Perspectiva</span></h2>

      <fieldset class="field">
        <legend class="lbl"><span class="t-en">Prism</span><span class="t-es">Prisma</span></legend>
        <div class="chips">
          <label><input type="checkbox"> <span class="t-en">Subjective</span><span class="t-es">Subjetivo</span></label>
          <label><input type="checkbox"> <span class="t-en">Objective</span><span class="t-es">Objetivo</span></label>
          <label><input type="checkbox"> <span class="t-en">Momentual</span><span class="t-es">Momentual</span></label>
          <label><input type="checkbox"> <span class="t-en">General</span><span class="t-es">General</span></label>
        </div>
      </fieldset>

      <fieldset class="field">
        <legend class="lbl"><span class="t-en">Tone</span><span class="t-es">Tono</span></legend>
        <div class="chips">
          <label><input type="checkbox"> <span class="t-en">Normal</span><span class="t-es">Normal</span></label>
          <label><input type="checkbox"> <span class="t-en">Funny</span><span class="t-es">Divertido</span></label>
          <label><input type="checkbox"> <span class="t-en">Formal</span><span class="t-es">Formal</span></label>
          <label><input type="checkbox"> <span class="t-en">Trivial</span><span class="t-es">Trivial</span></label>
        </div>
      </fieldset>

      <fieldset class="field">
        <legend class="lbl"><span class="t-en">Teleological background</span><span class="t-es">Trasfondo teleológico</span></legend>
        <div class="bar__choices">
          <label><input type="checkbox" name="cont"> <span class="t-en">Experimental</span><span class="t-es">Experimental</span></label>
          <label><input type="checkbox" name="cont"> <span class="t-en">Random</span><span class="t-es">Aleatorio</span></label>
          <label><input type="checkbox" name="cont"> <span class="t-en">Fine</span><span class="t-es">Fino</span></label>
          <label><input type="checkbox" name="cont"> <span class="t-en">Fatal</span><span class="t-es">Fatal</span></label>
        </div>
      </fieldset>

      <h3><span class="t-en">Focus</span><span class="t-es">Enfoque</span></h3>

      <fieldset class="field">
        <legend class="lbl"><span class="t-en">Field</span><span class="t-es">Campo</span></legend>
        <div class="chips">
          <label><input type="checkbox"> <span class="t-en">Metaphysics</span><span class="t-es">Metafísica</span></label>
          <label><input type="checkbox"> <span class="t-en">Science</span><span class="t-es">Ciencia</span></label>
          <label><input type="checkbox"> <span class="t-en">Biology</span><span class="t-es">Biología</span></label>
          <label><input type="checkbox"> <span class="t-en">Psychology</span><span class="t-es">Psicología</span></label>
          <label><input type="checkbox"> <span class="t-en">Sociology</span><span class="t-es">Sociología</span></label>
        </div>
      </fieldset>

      <fieldset class="field">
        <legend class="lbl"><span class="t-en">Time span</span><span class="t-es">Lapso temporal</span></legend>
        <div class="bar__choices">
          <label><input type="checkbox" name="time"> <span class="t-en">Past</span><span class="t-es">Pasado</span></label>
          <label><input type="checkbox" name="time"> <span class="t-en">Present</span><span class="t-es">Presente</span></label>
          <label><input type="checkbox" name="time"> <span class="t-en">Future</span><span class="t-es">Futuro</span></label>
          <label><input type="checkbox" name="time"> <span class="t-en">Short</span><span class="t-es">Corto</span></label>
          <label><input type="checkbox" name="time"> <span class="t-en">Mid</span><span class="t-es">Medio</span></label>
          <label><input type="checkbox" name="time"> <span class="t-en">Long</span><span class="t-es">Largo</span></label>
        </div>
      </fieldset>
    </section>

    <!-- PACK 3 · EXPLAINERS -->
    <section class="pack pack--3">
      <h2><span class="t-en">Explainers</span><span class="t-es">Explicadores</span></h2>
      <div class="grid grid--two">
        <label class="field"><textarea rows="2" placeholder="PHRASE that defines it"></textarea></label>
        <label class="field"><input type="text" placeholder="RELATE it to something else"></label>
        <label class="field"><textarea rows="2" placeholder="WHY is it important"></textarea></label>
        <label class="field"><textarea rows="2" placeholder="WHAT special properties does it have"></textarea></label>
        <label class="field"><textarea rows="2" placeholder="HOW does it work"></textarea></label>
        <label class="field"><textarea rows="2" placeholder="WHO / WHERE / WHEN"></textarea></label>
      </div>
    </section>

    <!-- PACK 4 · FORMALISE -->
    <section class="pack pack--4">
      <h2><span class="t-en">Formalise</span><span class="t-es">Formalizar</span></h2>
      <div class="funnel">
        <div class="funnel__band">
          <textarea rows="2" placeholder="Axiom"></textarea>
        </div>

        <div class="evidence">
          <div class="grid grid--two">
            <label class="field">
              <select>
                <option value="" disabled selected>Kind…</option>
                <option>Actual</option><option>Past</option><option>Case study</option><option>Review</option>
              </select>
            </label>
            <label class="field">
              <input type="text" placeholder="Sources">
            </label>
          </div>
          <label class="field">
            <textarea rows="3" placeholder="Write EVIDENCE(s) here"></textarea>
          </label>
        </div>

        <div class="funnel__band">
          <textarea rows="2" placeholder="Prediction"></textarea>
        </div>
        <div class="funnel__band">
          <textarea rows="2" placeholder="Proposal"></textarea>
        </div>
        <div class="funnel__band">
          <textarea rows="2" placeholder="Challenge"></textarea>
        </div>
      </div>
    </section>
  </main>

  <!-- stepper (below) — dots + centred Back/Next, no section titles -->
  <nav class="step-footer" aria-label="Steps">
    <div class="stepnav">
      <label class="stepnav-node" for="step-1" tabindex="0"><span class="stepnav-dot" aria-hidden="true">1</span></label>
      <label class="stepnav-node" for="step-2" tabindex="0"><span class="stepnav-dot" aria-hidden="true">2</span></label>
      <label class="stepnav-node" for="step-3" tabindex="0"><span class="stepnav-dot" aria-hidden="true">3</span></label>
      <label class="stepnav-node" for="step-4" tabindex="0"><span class="stepnav-dot" aria-hidden="true">4</span></label>
    </div>
    <div class="step-controls">
      <div class="step-ctl step-ctl--1">
        <label class="step-btn step-btn--next" for="step-2"><span class="t-en">Next</span><span class="t-es">Siguiente</span> →</label>
      </div>
      <div class="step-ctl step-ctl--2">
        <label class="step-btn" for="step-1">← <span class="t-en">Back</span><span class="t-es">Atrás</span></label>
        <label class="step-btn step-btn--next" for="step-3"><span class="t-en">Next</span><span class="t-es">Siguiente</span> →</label>
      </div>
      <div class="step-ctl step-ctl--3">
        <label class="step-btn" for="step-2">← <span class="t-en">Back</span><span class="t-es">Atrás</span></label>
        <label class="step-btn step-btn--next" for="step-4"><span class="t-en">Next</span><span class="t-es">Siguiente</span> →</label>
      </div>
      <div class="step-ctl step-ctl--4">
        <label class="step-btn" for="step-3">← <span class="t-en">Back</span><span class="t-es">Atrás</span></label>
      </div>
    </div>
  </nav>

  <details class="output">
    <summary><span class="t-en">Know more</span><span class="t-es">Saber más</span></summary>
    <div class="output__box">
      <span class="t-en">Visit</span><span class="t-es">Visita</span> <a href="https://flove.org">flove.org</a>
    </div>
  </details>
</body>
</html>
