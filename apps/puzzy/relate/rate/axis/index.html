<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>✺ flove · Puzzy — Axis</title>
  <link rel="stylesheet" href="../../../../flove.css">
  <style>
    :root{
      /* flove identity overrides — Puzzy: violet accent, teal flourish, on a deep canvas */
      --app-accent:        #8d89ff;
      --app-accent-soft:   #c9c6ff;
      --app-ink-on-accent: #0b0b14;

      /* Puzzy local palette (dark) */
      --bg:#0b0b0f; --panel:#11131a; --ink:#e9eaf2; --muted:#a3a7b4;
      --line:#1e2133; --field:#13162a; --accent2:#70f0d3;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--ink);
      background:
        radial-gradient(1000px 700px at 110% -10%, rgba(141,137,255,.16), transparent 60%),
        radial-gradient(800px 600px at -10% 120%, rgba(112,240,211,.12), transparent 50%),
        var(--bg);
      font-family:var(--flove-font-ui); letter-spacing:.2px;
    }

    /* i18n — pure CSS (§13.2) */
    .t-es{ display:none }
    body:has(#ui-lang-es:checked) .t-en{ display:none }
    body:has(#ui-lang-es:checked) .t-es{ display:inline }

    /* language toggle inside the flove-bar */
    .lang{ display:inline-flex; gap:2px; margin-left:auto }
    .lang input{ position:absolute; opacity:0; pointer-events:none }
    .lang label{
      font-size:11px; font-weight:600; letter-spacing:.4px; padding:3px 9px;
      border-radius:var(--flove-radius-pill); cursor:pointer; color:var(--muted);
      border:1px solid transparent;
    }
    #ui-lang-en:checked ~ label[for=ui-lang-en],
    #ui-lang-es:checked ~ label[for=ui-lang-es]{
      color:var(--app-ink-on-accent); background:var(--app-accent); border-color:var(--app-accent);
    }

    /* header */
    .top{ max-width:980px; margin:1.4rem auto .4rem; padding:0 1rem }
    .top h1{
      margin:.2rem 0; font-size:1.9rem; letter-spacing:.5px;
      background:linear-gradient(180deg,#fff,#cfc9ff);
      -webkit-background-clip:text; background-clip:text; color:transparent;
    }
    .lede{ color:var(--muted); margin:.2rem 0 0 }

    /* stage */
    .stage{ max-width:980px; margin:1rem auto 4rem; padding:0 1rem; display:grid; place-items:center }

    /* Canvas with symmetric axes — re-tinted to Puzzy */
    .axes{
      position:relative; width:min(92vw,860px); height:min(64vh,560px);
      border:1px dashed var(--line); border-radius:var(--flove-radius);
      background:
        linear-gradient(rgba(141,137,255,.55),rgba(141,137,255,.55)) 50%/2px 84% no-repeat,
        linear-gradient(90deg,rgba(141,137,255,.55),rgba(141,137,255,.55)) 50%/84% 2px no-repeat,
        radial-gradient(1000px 600px at 10% 90%, rgba(141,137,255,.10) 0%, transparent 60%),
        radial-gradient(900px 500px at 90% 10%, rgba(112,240,211,.08) 0%, transparent 60%),
        linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
    }

    /* Central textarea — transparent, elegant */
    .center{
      position:absolute; left:50%; top:50%; translate:-50% -50%;
      width:min(30ch,42%); height:clamp(60px,12vh,110px); resize:none;
      padding:.6rem .8rem; border-radius:var(--flove-radius-sm); border:1px solid var(--line);
      background:var(--field); color:var(--ink); font:inherit;
      box-shadow:0 6px 22px rgba(0,0,0,.28);
    }
    .center:focus{
      outline:none; border-color:var(--app-accent);
      box-shadow:0 0 0 3px rgba(141,137,255,.18), 0 8px 28px rgba(0,0,0,.35);
    }

    /* Buttons / icons */
    .ico{
      position:absolute; left:var(--x); top:var(--y); translate:-50% -50%;
      display:grid; place-items:center; width:72px; aspect-ratio:1; border-radius:50%;
      background:#171a2e; border:1px solid var(--line); backdrop-filter:blur(8px);
      transition:transform .25s cubic-bezier(.2,.9,.3,1), box-shadow .25s ease, border-color var(--flove-fast);
      box-shadow:0 8px 26px rgba(0,0,0,.38); cursor:pointer; user-select:none;
    }
    .ico:hover{ border-color:var(--app-accent) }
    .ico:active{ transform:translate(-50%,-50%) scale(1.06) }
    .ico > span{ font-size:clamp(28px,6vmin,42px); transform:translateY(-2px) }

    /* Invisible inputs (state machine 0→1→2→3→0 per icon) */
    .state{ position:absolute; opacity:0; pointer-events:none }

    /* Show ONLY the label (button) matching each icon's current state */
    /* State 0 → show the label pointing to 1 (base scale) */
    #n-0:checked ~ label[for="n-1"],
    #s-0:checked ~ label[for="s-1"],
    #e-0:checked ~ label[for="e-1"],
    #w-0:checked ~ label[for="w-1"]{ display:grid; transform:translate(-50%,-50%) scale(1) }

    /* State 1 → show the label pointing to 2 (grows) */
    #n-1:checked ~ label[for="n-2"],
    #s-1:checked ~ label[for="s-2"],
    #e-1:checked ~ label[for="e-2"],
    #w-1:checked ~ label[for="w-2"]{ display:grid; transform:translate(-50%,-50%) scale(1.38) }

    /* State 2 → show the label pointing to 3 (grows more) */
    #n-2:checked ~ label[for="n-3"],
    #s-2:checked ~ label[for="s-3"],
    #e-2:checked ~ label[for="e-3"],
    #w-2:checked ~ label[for="w-3"]{ display:grid; transform:translate(-50%,-50%) scale(1.76) }

    /* State 3 → show the label that returns to 0 (max size) */
    #n-3:checked ~ label[for="n-0"],
    #s-3:checked ~ label[for="s-0"],
    #e-3:checked ~ label[for="e-0"],
    #w-3:checked ~ label[for="w-0"]{ display:grid; transform:translate(-50%,-50%) scale(2.08) }

    /* By default all labels hidden; activated by the rules above */
    label.ico{ display:none }

    /* Symmetric positions (N,S,E,W) */
    .pos-n{ --x:50%; --y:8%  }
    .pos-s{ --x:50%; --y:92% }
    .pos-e{ --x:92%; --y:50% }
    .pos-w{ --x:8%;  --y:50% }

    /* know more */
    .output{ max-width:980px; margin:0 auto 5rem; padding:0 1rem }
    .output summary{ cursor:pointer; color:var(--muted) }
    .output__box{ border:1px solid var(--line); border-radius:var(--flove-radius-sm); padding:.7rem; background:#111426; margin-top:.5rem }
    .output a{ color:var(--accent2) }
  </style>
</head>
<body>
  <!-- language radios (drive the pure-CSS i18n) -->
  <nav class="flove-bar flove-bar--dark">
    <a class="flove-home" href="../../../../index.html">← <span class="t-en">Apps</span><span class="t-es">Apps</span></a>
    <span class="flove-mark flove-asterism" aria-hidden="true">✺</span>
    <span class="flove-app-name">Puzzy</span>
    <span class="flove-tag">Axis</span>
    <span class="lang">
      <input type="radio" name="ui-lang" id="ui-lang-en" checked>
      <input type="radio" name="ui-lang" id="ui-lang-es">
      <label for="ui-lang-en">EN</label>
      <label for="ui-lang-es">ES</label>
    </span>
  </nav>

  <header class="top">
    <h1><span class="t-en">Axial Rating</span><span class="t-es">Calificación Axial</span></h1>
    <p class="lede"><span class="t-en">Tap each pole to rate it — every tap grows the icon one notch around the axis.</span><span class="t-es">Toca cada polo para calificarlo — cada toque agranda el icono un paso alrededor del eje.</span></p>
  </header>

  <main class="stage">
    <section class="axes" aria-label="Axis with 4 icons and central textarea">
      <!-- NORTH: states 0..3 (radios sharing the same name) -->
      <input class="state" type="radio" name="n" id="n-0" checked>
      <input class="state" type="radio" name="n" id="n-1">
      <input class="state" type="radio" name="n" id="n-2">
      <input class="state" type="radio" name="n" id="n-3">
      <!-- The visible label depends on the state and points to the next -->
      <label class="ico pos-n" for="n-1"><span>😊</span></label>
      <label class="ico pos-n" for="n-2"><span>😊</span></label>
      <label class="ico pos-n" for="n-3"><span>😊</span></label>
      <label class="ico pos-n" for="n-0"><span>😊</span></label>

      <!-- SOUTH -->
      <input class="state" type="radio" name="s" id="s-0" checked>
      <input class="state" type="radio" name="s" id="s-1">
      <input class="state" type="radio" name="s" id="s-2">
      <input class="state" type="radio" name="s" id="s-3">
      <label class="ico pos-s" for="s-1"><span>😐</span></label>
      <label class="ico pos-s" for="s-2"><span>😐</span></label>
      <label class="ico pos-s" for="s-3"><span>😐</span></label>
      <label class="ico pos-s" for="s-0"><span>😐</span></label>

      <!-- EAST -->
      <input class="state" type="radio" name="e" id="e-0" checked>
      <input class="state" type="radio" name="e" id="e-1">
      <input class="state" type="radio" name="e" id="e-2">
      <input class="state" type="radio" name="e" id="e-3">
      <label class="ico pos-e" for="e-1"><span>☹️</span></label>
      <label class="ico pos-e" for="e-2"><span>☹️</span></label>
      <label class="ico pos-e" for="e-3"><span>☹️</span></label>
      <label class="ico pos-e" for="e-0"><span>☹️</span></label>

      <!-- WEST -->
      <input class="state" type="radio" name="w" id="w-0" checked>
      <input class="state" type="radio" name="w" id="w-1">
      <input class="state" type="radio" name="w" id="w-2">
      <input class="state" type="radio" name="w" id="w-3">
      <label class="ico pos-w" for="w-1"><span>❤</span></label>
      <label class="ico pos-w" for="w-2"><span>❤</span></label>
      <label class="ico pos-w" for="w-3"><span>❤</span></label>
      <label class="ico pos-w" for="w-0"><span>❤</span></label>

      <!-- Central textarea -->
      <textarea class="center" placeholder="What are you rating?"></textarea>
    </section>
  </main>

  <details class="output">
    <summary><span class="t-en">Know more</span><span class="t-es">Saber más</span></summary>
    <div class="output__box">
      <span class="t-en">Visit</span><span class="t-es">Visita</span> <a href="https://flove.org">flove.org</a>
    </div>
  </details>
</body>
</html>
