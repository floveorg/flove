<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes"/>
  <title>✺ flove · Thingy</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="flove.css">
  <style>
    :root {
      /* flove identity overrides — navy Thingy */
      --app-accent:        #1e4a6b;
      --app-accent-soft:   #b9d2e5;
      --app-ink-on-accent: #ffffff;
    }
    * {
      box-sizing: border-box;
      margin: 0;
    }

    body {
      background: #f5f9ff;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0.6rem 0.6rem 1.2rem;
      color: #1a2e3f;
      line-height: 1.4;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
    }

    /* header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.2rem 0 0.6rem;
      border-bottom: 1px solid rgba(18, 52, 77, 0.08);
      margin-bottom: 0.8rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo-icon {
      background: #1e4a6b;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 500;
    }

    .logo-text {
      font-weight: 650;
      font-size: 1.2rem;
      color: #0f2f44;
    }

    .logo-text span {
      font-weight: 400;
      color: #5f7e9c;
      font-size: 0.65rem;
      margin-left: 3px;
    }

    .top-menu {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .top-menu a {
      text-decoration: none;
      color: #3a5a78;
      font-size: 1.1rem;
    }

    .menu-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #3e627c;
      padding: 4px;
    }

    /* tabs – icons only, wrapped */
    .tabs-wrapper {
      margin: 0.4rem 0 1rem;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-start;
    }

    .tab {
      background: white;
      border: 1px solid #d3e0ea;
      color: #1e405b;
      width: 44px;
      height: 44px;
      border-radius: 16px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tab.active {
      background: #1e4a6b;
      border-color: #1e4a6b;
      color: white;
    }

    .tab i {
      font-size: 1.2rem;
    }

    /* table */
    .table-wrapper {
      background: white;
      border-radius: 18px;
      padding: 0.1rem 0 0.2rem;
      box-shadow: 0 6px 14px -6px rgba(0, 20, 40, 0.06);
      border: 1px solid #e0eaf3;
      overflow: hidden;
      margin-bottom: 1.2rem;
    }

    .table {
      display: table;
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
    }

    .thead .tr {
      background: #f2f7fc;
      border-bottom: 2px solid #cbdbe9;
      font-weight: 600;
      color: #1a405b;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.01em;
    }

    .tr {
      display: table-row;
      cursor: pointer;
    }

    .th, .td {
      display: table-cell;
      padding: 8px 4px;
      vertical-align: middle;
      border-bottom: 1px solid #e6ecf3;
      text-align: center;
    }

    .col-item {
      width: 24%;
      text-align: left;
      font-weight: 520;
      font-size: 0.75rem;
      padding-left: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-have, .col-wish, .col-want, .col-need {
      width: 13%;
      cursor: pointer;
      user-select: none;
    }

    /* cell selected states (no checkbox) */
    .td.selected-have {
      background: #c8e6c9;
      position: relative;
    }
    .td.selected-wish {
      background: #bbdefb;
    }
    .td.selected-want {
      background: #ffe0b2;
    }
    .td.selected-need {
      background: #ffcdd2;
    }

    /* subtle indicator inside cell (optional dot) */
    .td.selected-have::after,
    .td.selected-wish::after,
    .td.selected-want::after,
    .td.selected-need::after {
      content: "•";
      font-size: 16px;
      line-height: 1;
      margin-left: 2px;
      opacity: 0.8;
    }

    /* row priority highlight (overrides cell background) */
    .tbody .tr[data-priority="need"] { background: #ffe9e7; border-left: 4px solid #c7362b; }
    .tbody .tr[data-priority="want"] { background: #fff1dd; border-left: 4px solid #d18e1a; }
    .tbody .tr[data-priority="wish"] { background: #e1ecfc; border-left: 4px solid #2f6eb0; }
    .tbody .tr[data-priority="have"] { background: #e2f3e2; border-left: 4px solid #2b7a4b; }

    .tr.hidden-row {
      display: none;
    }

    /* phrase panel */
    .phrase-panel {
      background: white;
      border-radius: 20px;
      padding: 0.8rem 0.8rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.02);
      border: 1px solid #dee9f2;
    }

    .phrase-rows {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .phrase-line {
      background: #f3f9ff;
      padding: 0.4rem 0.8rem;
      border-radius: 30px;
      border: 1px dashed #b3cee5;
      font-size: 0.8rem;
      color: #0c334c;
      font-weight: 480;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phrase-line i {
      width: 18px;
      color: #1e4a6b;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: space-between;
    }

    .btn {
      border: none;
      background: #eef3f8;
      padding: 0.45rem 0.8rem;
      border-radius: 40px;
      font-weight: 550;
      font-size: 0.75rem;
      color: #1e405b;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid transparent;
      flex: 1 0 auto;
      justify-content: center;
    }

    .btn-primary {
      background: #1e4a6b;
      color: white;
    }

    .btn-outline {
      background: white;
      border: 1px solid #c2d6e6;
    }

    .magic-btn {
      background: #f6ede0;
      color: #654321;
      border: 1px solid #e1cfb8;
    }

    .foot {
      margin-top: 1rem;
      text-align: center;
      color: #58738c;
      font-size: 0.65rem;
    }
  </style>
</head>
<body>

<div class="flove-bar">
  <a class="flove-home" href="index.html">←</a>
  <span class="flove-mark flove-asterism">✺</span>
  <span class="flove-app-name">thingy</span>
  <span class="flove-spacer"></span>
  <span class="flove-tag">tener · pedir · dar</span>
</div>

<div class="app">
  <header class="app-header">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div class="logo-text">OFFERS <span>have/wish/want/need</span></div>
    </div>
    <div class="top-menu">
      <a href="#"><i class="far fa-circle-question"></i></a>
      <a href="#"><i class="far fa-user"></i></a>
      <button class="menu-btn"><i class="fas fa-ellipsis"></i></button>
    </div>
  </header>

  <!-- Tabs: icons only, wrapped rows -->
  <div class="tabs-wrapper">
    <div class="tabs" id="categoryTabs"></div>
  </div>

  <!-- Table with clickable cells (no checkboxes) -->
  <div class="table-wrapper">
    <div class="table" role="table">
      <div class="thead">
        <div class="tr head">
          <div class="th col-item"></div>
          <div class="th col-have">HAVE</div>
          <div class="th col-wish">WISH</div>
          <div class="th col-want">WANT</div>
          <div class="th col-need">NEED</div>
        </div>
      </div>
      <div class="tbody" id="tableBody"></div>
    </div>
  </div>

  <!-- Phrase rows -->
  <div class="phrase-panel">
    <div class="phrase-rows" id="phraseRows">
      <div class="phrase-line"><i class="fas fa-check-circle"></i> <span id="haveCount">0</span> HAVE</div>
      <div class="phrase-line"><i class="fas fa-star"></i> <span id="wishCount">0</span> WISH</div>
      <div class="phrase-line"><i class="fas fa-fire"></i> <span id="wantCount">0</span> WANT</div>
      <div class="phrase-line"><i class="fas fa-exclamation-triangle"></i> <span id="needCount">0</span> NEED</div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-outline" id="copyPhraseBtn"><i class="far fa-copy"></i> Copiar</button>
      <button class="btn magic-btn" id="magicInsightBtn"><i class="fas fa-wand-magic-sparkles"></i> Insight</button>
      <button class="btn btn-primary" id="saveBtn"><i class="fas fa-download"></i> Guardar</button>
    </div>
  </div>

  <footer class="foot">
    <i class="far fa-lightbulb"></i> Toca cualquier celda para alternar (HAVE/WISH/WANT/NEED). Prioridad: NEED > WANT > WISH > HAVE.
  </footer>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CATEGORIES (icons only) ----------
    const categories = [
      { id: 'all', label: 'Todos', icon: 'fa-border-all', class: '' },
      { id: 'salud', label: 'Salud', icon: 'fa-heart-pulse', class: 'cat-salud' },
      { id: 'outdoor', label: 'Outdoor', icon: 'fa-tree', class: 'cat-outdoor' },
      { id: 'infra', label: 'Vivienda', icon: 'fa-house-chimney', class: 'cat-infra' },
      { id: 'comms', label: 'Comms', icon: 'fa-wifi', class: 'cat-comms' },
      { id: 'alimentos', label: 'Food', icon: 'fa-utensils', class: 'cat-alimentos' },
      { id: 'servicios', label: 'Servicios', icon: 'fa-bell-concierge', class: 'cat-servicios' },
      { id: 'm-sica', label: 'Música', icon: 'fa-music', class: 'cat-m-sica' },
      { id: 'eventos', label: 'Eventos', icon: 'fa-calendar-star', class: 'cat-eventos' },
      { id: 'varios', label: 'Otros', icon: 'fa-shapes', class: 'cat-varios' }
    ];

    // ---------- DEMO ITEMS (popular per category) ----------
    const demoItems = [
      // Salud
      ['First aid kit', 'cat-salud'], ['Thermometer', 'cat-salud'], ['Vitamins', 'cat-salud'],
      ['Pain reliever', 'cat-salud'], ['Bandages', 'cat-salud'], ['Face masks', 'cat-salud'],
      // Outdoor
      ['Tent', 'cat-outdoor'], ['Sleeping bag', 'cat-outdoor'], ['Hiking boots', 'cat-outdoor'],
      ['Camping stove', 'cat-outdoor'], ['Backpack', 'cat-outdoor'], ['Water bottle', 'cat-outdoor'],
      ['Flashlight', 'cat-outdoor'],
      // Vivienda
      ['Room', 'cat-infra'], ['Couch', 'cat-infra'], ['Kitchen', 'cat-infra'],
      ['Bathroom', 'cat-infra'], ['Garden', 'cat-infra'], ['Parking', 'cat-infra'],
      ['Storage', 'cat-infra'],
      // Comms
      ['Smartphone', 'cat-comms'], ['Laptop', 'cat-comms'], ['WiFi router', 'cat-comms'],
      ['Headphones', 'cat-comms'], ['Power bank', 'cat-comms'], ['Tablet', 'cat-comms'],
      // Food
      ['Rice', 'cat-alimentos'], ['Pasta', 'cat-alimentos'], ['Olive oil', 'cat-alimentos'],
      ['Canned tomatoes', 'cat-alimentos'], ['Coffee', 'cat-alimentos'], ['Bread', 'cat-alimentos'],
      ['Eggs', 'cat-alimentos'], ['Milk', 'cat-alimentos'],
      // Servicios
      ['Cleaning', 'cat-servicios'], ['Laundry', 'cat-servicios'], ['Gardening', 'cat-servicios'],
      ['Babysitting', 'cat-servicios'], ['Tutoring', 'cat-servicios'], ['Pet sitting', 'cat-servicios'],
      // Música
      ['Guitar', 'cat-m-sica'], ['Piano', 'cat-m-sica'], ['Ukulele', 'cat-m-sica'],
      ['Microphone', 'cat-m-sica'], ['Music lessons', 'cat-m-sica'], ['Drums', 'cat-m-sica'],
      // Eventos
      ['Concert ticket', 'cat-eventos'], ['Workshop', 'cat-eventos'], ['Conference', 'cat-eventos'],
      ['Party supplies', 'cat-eventos'], ['Exhibition', 'cat-eventos'], ['Retreat', 'cat-eventos'],
      // Otros
      ['Books', 'cat-varios'], ['Board games', 'cat-varios'], ['Art supplies', 'cat-varios'],
      ['Pet food', 'cat-varios'], ['Gift card', 'cat-varios'], ['Batteries', 'cat-varios'],
      ['Notebook', 'cat-varios']
    ];

    // classic extras
    const classics = [
      ['Space', 'cat-varios'], ['Swimming pool', 'cat-infra'], ['Bike', 'cat-outdoor'],
      ['Water', 'cat-alimentos'], ['Internet', 'cat-comms'], ['First aid', 'cat-salud']
    ];

    // ---------- RENDER TABS ----------
    const tabsDiv = document.getElementById('categoryTabs');
    function renderTabs() {
      tabsDiv.innerHTML = categories.map(cat => 
        `<div class="tab" data-cat="${cat.id}" data-catclass="${cat.class}" title="${cat.label}"><i class="fas ${cat.icon}"></i></div>`
      ).join('');
    }
    renderTabs();

    // ---------- BUILD TABLE (cells without checkboxes) ----------
    const tbody = document.getElementById('tableBody');
    function buildRow(itemName, catClass) {
      const div = document.createElement('div');
      div.className = `tr row ${catClass}`;
      div.setAttribute('data-category', catClass.replace('cat-', ''));
      div.innerHTML = `
        <span class="td col-item">${itemName}</span>
        <span class="td col-have" data-type="have"></span>
        <span class="td col-wish" data-type="wish"></span>
        <span class="td col-want" data-type="want"></span>
        <span class="td col-need" data-type="need"></span>
      `;
      return div;
    }

    demoItems.forEach(([name, catClass]) => tbody.appendChild(buildRow(name, catClass)));
    classics.forEach(([name, catClass]) => tbody.appendChild(buildRow(name, catClass)));

    // ---------- HELPERS ----------
    function getRows() {
      return Array.from(document.querySelectorAll('.tbody .tr.row'));
    }

    // Determine priority for row highlight
    function updateRowPriority(row) {
      const need = row.querySelector('.col-need')?.classList.contains('selected-need');
      const want = row.querySelector('.col-want')?.classList.contains('selected-want');
      const wish = row.querySelector('.col-wish')?.classList.contains('selected-wish');
      const have = row.querySelector('.col-have')?.classList.contains('selected-have');
      let priority = '';
      if (need) priority = 'need';
      else if (want) priority = 'want';
      else if (wish) priority = 'wish';
      else if (have) priority = 'have';
      row.setAttribute('data-priority', priority);
    }

    function updateAllHighlights() {
      getRows().forEach(r => updateRowPriority(r));
    }

    // Counts for phrase
    const haveSpan = document.getElementById('haveCount');
    const wishSpan = document.getElementById('wishCount');
    const wantSpan = document.getElementById('wantCount');
    const needSpan = document.getElementById('needCount');

    function updateCounts() {
      const visible = getRows().filter(r => !r.classList.contains('hidden-row'));
      let have = 0, wish = 0, want = 0, need = 0;
      visible.forEach(r => {
        if (r.querySelector('.col-have')?.classList.contains('selected-have')) have++;
        if (r.querySelector('.col-wish')?.classList.contains('selected-wish')) wish++;
        if (r.querySelector('.col-want')?.classList.contains('selected-want')) want++;
        if (r.querySelector('.col-need')?.classList.contains('selected-need')) need++;
      });
      haveSpan.textContent = have;
      wishSpan.textContent = wish;
      wantSpan.textContent = want;
      needSpan.textContent = need;
    }

    // Cell click handler (toggle selection)
    function handleCellClick(e) {
      const cell = e.target.closest('.td');
      if (!cell) return;
      const row = cell.closest('.tr.row');
      if (!row) return;
      
      const type = cell.dataset.type; // 'have','wish','want','need'
      if (!type) return;

      // Toggle the selected class on this cell
      cell.classList.toggle(`selected-${type}`);
      
      // Update row priority and counts
      updateRowPriority(row);
      updateCounts();
    }

    // Tab filtering
    let activeCat = 'all';
    const tabs = document.querySelectorAll('.tab');
    function filterByCategory(catId) {
      const catInfo = categories.find(c => c.id === catId);
      const targetClass = catInfo ? catInfo.class : '';
      getRows().forEach(row => {
        if (catId === 'all' || row.classList.contains(targetClass)) {
          row.classList.remove('hidden-row');
        } else {
          row.classList.add('hidden-row');
        }
      });
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.cat === catId));
      activeCat = catId;
      updateCounts();
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => filterByCategory(tab.dataset.cat));
    });

    // Attach cell click listeners (delegation)
    tbody.addEventListener('click', handleCellClick);

    // Copy phrase
    document.getElementById('copyPhraseBtn').addEventListener('click', async () => {
      const h = haveSpan.textContent, w = wishSpan.textContent, wa = wantSpan.textContent, n = needSpan.textContent;
      const text = `HAVE: ${h}  ·  WISH: ${w}  ·  WANT: ${wa}  ·  NEED: ${n}`;
      try {
        await navigator.clipboard.writeText(text);
        alert('📋 Resumen copiado');
      } catch { prompt('Copia:', text); }
    });

    // Magic insight
    const insights = [
      "🧘 Prioriza tus NEED.", "🌱 Buen equilibrio.", "🎯 Convierte WANT en acción.",
      "🏡 Hogar y bienestar destacan.", "💡 Muchos WISH: sueña en pasos.",
      "⚖️ Revisa tus NEED.", "🌟 Claridad al ordenar."
    ];
    document.getElementById('magicInsightBtn').addEventListener('click', () => {
      const visible = getRows().filter(r => !r.classList.contains('hidden-row'));
      let need = 0, want = 0;
      visible.forEach(r => {
        if (r.querySelector('.col-need')?.classList.contains('selected-need')) need++;
        if (r.querySelector('.col-want')?.classList.contains('selected-want')) want++;
      });
      let msg = insights[Math.floor(Math.random() * insights.length)];
      if (need > 3) msg = "⚠️ Tienes varias necesidades (NEED). ¡Planifica!";
      else if (want > 4) msg = "🎈 Muchos WANT: elige uno para empezar.";
      alert(`✨ Insight: ${msg}`);
    });

    // Save TXT
    document.getElementById('saveBtn').addEventListener('click', () => {
      const out = ['OFFERS snapshot\n'];
      getRows().forEach(r => {
        const item = r.querySelector('.col-item')?.textContent.trim() || '';
        const have = r.querySelector('.col-have')?.classList.contains('selected-have') ? '1' : '0';
        const wish = r.querySelector('.col-wish')?.classList.contains('selected-wish') ? '1' : '0';
        const want = r.querySelector('.col-want')?.classList.contains('selected-want') ? '1' : '0';
        const need = r.querySelector('.col-need')?.classList.contains('selected-need') ? '1' : '0';
        if (have==='1'||wish==='1'||want==='1'||need==='1') {
          out.push(`${item}\tHAVE:${have}\tWISH:${wish}\tWANT:${want}\tNEED:${need}`);
        }
      });
      const blob = new Blob([out.join('\n')], {type: 'text/plain'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'offers_snapshot.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // Initialize
    filterByCategory('all');
    updateAllHighlights();
    updateCounts();
  })();
</script>

<a class="flove-footer-badge" href="index.html">
  <span class="flove-asterism flove-asterism--still">✺</span> all apps
</a>
</body>
</html>
