baseURL = "https://flove.org/blog/"
languageCode = "en-us"
title = "✺ flove · blog"
theme = "ananke"

# /blog se sirve bajo el dominio raíz, así que dejamos baseURL absoluta
# y publicamos a public/blog desde el CI.
canonifyURLs = false
relativeURLs = false

[params]
  description = "Notes from the flove project — slow it · flow it · love it."
  author = "Rafael"
  featured_image = ""
  recent_posts_number = 5

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Apps"
    url = "/launcher.html"
    weight = 2
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 3
