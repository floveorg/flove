services:
  flove:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flove
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: unless-stopped
