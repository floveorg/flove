services:
  flove:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flove
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
    restart: unless-stopped
    depends_on:
      - api

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: flove-api
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=flove
      - DB_USER=flove
      - DB_PASS=flove_secret
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: flove-db
    environment:
      - POSTGRES_DB=flove
      - POSTGRES_USER=flove
      - POSTGRES_PASSWORD=flove_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flove"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
