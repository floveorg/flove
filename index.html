<html lang="es">
<head>
<meta charset="utf-8" />

<title>✺ flove</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: radial-gradient(1100px 700px at 110% -10%, #effdf7 0, transparent 55%),
                radial-gradient(900px 600px at -10% 110%, #f4f1ff 0, transparent 55%),
                #fff8f1;
    color: #1a1820;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100svh;
    padding: 2rem;
  }
  .logo {
    font-size: 4rem;
    line-height: 1;
    margin-bottom: .5rem;
    letter-spacing: -.03em;
    font-weight: 300;
    font-family: 'Georgia', serif;
  }
  .logo span { color: #ff8a8a; }
  .sub {
    color: #6a6478;
    margin-bottom: 3rem;
    font-size: 1rem;
  }
  nav {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  nav a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    width: 160px;
    padding: 2rem 1rem;
    border-radius: 20px;
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(20,16,32,.08);
    text-decoration: none;
    color: #1a1820;
    font-weight: 500;
    font-size: 1.1rem;
    transition: transform .2s, box-shadow .2s;
  }
  nav a:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(20,16,32,.1);
  }
  nav a .ico { font-size: 2rem; }
  nav a .desc {
    font-size: .8rem;
    color: #6a6478;
    font-weight: 400;
    text-align: center;
  }
  .footer {
    margin-top: 3rem;
    font-size: .8rem;
    color: #6a6478;
  }
</style>
</head>
<body>
  <div class="logo">✺ <span>flove</span></div>
  <p class="sub">slow it · flow it · love it</p>
  <nav>
    <a href="./">
      <span class="ico">🏠</span>
      Inicio
      <span class="desc">página de bienvenida</span>
    </a>
    <a href="./apps.html">
      <span class="ico">🧩</span>
      Apps
      <span class="desc">explora las aplicaciones</span>
    </a>
    <a href="./docs/">
      <span class="ico">📖</span>
      Docs
      <span class="desc">documentación y teoría</span>
    </a>
  </nav>
  <p class="footer">CC BY-SA 4.0 · Marc (marcflove)</p>
</body>
</html>
