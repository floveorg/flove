server {
    listen 80;
    server_name flove.org www.flove.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name flove.org www.flove.org;

    ssl_certificate     /etc/letsencrypt/live/flove.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flove.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        sub_filter '</body>
</html>' '<script src="/flove-api.js"></script><script>floveAPI.init();</script></body>
</html>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    location = /flove-api.js {
        add_header Cache-Control "public, max-age=3600";
    }

    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        index index.html;
    }

    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_flags ~ secure samesite=lax;
        proxy_read_timeout 30s;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
