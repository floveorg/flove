server {
    listen 80;
    server_name flove.org www.flove.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name flove.org www.flove.org;

    ssl_certificate     /etc/letsencrypt/live/flove.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flove.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /docs/ {
        alias /usr/share/nginx/html/docs/;
        index index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
