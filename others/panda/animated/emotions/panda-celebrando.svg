<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda celebrando (animado)">
  <title>Panda celebrando · animado</title>
  <style><![CDATA[
    .head  { transform-box: view-box; transform-origin: 100px 150px; animation: cel-head .9s ease-in-out infinite; }
    .torso { transform-box: view-box; transform-origin: 100px 174px; animation: bounce .9s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 74px 152px;  animation: cel-arml .6s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 126px 152px; animation: cel-armr .6s ease-in-out infinite; }
    .foot-l{ transform-box: fill-box; transform-origin: center; animation: tap .45s ease-in-out infinite; }
    .foot-r{ transform-box: fill-box; transform-origin: center; animation: tap .45s ease-in-out infinite .22s; }
    .eyes  { transform-box: view-box; transform-origin: 100px 93px; animation: twinkle 1s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center; animation: laugh .45s ease-in-out infinite; }
    .s1{ transform-box: view-box; transform-origin: 42px 40px;  animation: pop 1.1s ease-in-out infinite; }
    .s2{ transform-box: view-box; transform-origin: 160px 38px; animation: pop 1.1s ease-in-out infinite .3s; }
    .s3{ transform-box: view-box; transform-origin: 168px 78px; animation: pop 1.1s ease-in-out infinite .6s; }
    .s4{ transform-box: view-box; transform-origin: 34px 80px;  animation: pop 1.1s ease-in-out infinite .85s; }

    @keyframes cel-head { 0%,100%{transform:rotate(-5deg) translateY(0)} 50%{transform:rotate(5deg) translateY(-3px)} }
    @keyframes bounce   { 0%,100%{transform:translateY(0) scaleY(1)} 50%{transform:translateY(-4px) scaleY(1.04)} }
    @keyframes cel-arml { 0%{transform:rotate(-20deg)} 50%{transform:rotate(-34deg)} 100%{transform:rotate(-20deg)} }
    @keyframes cel-armr { 0%{transform:rotate(20deg)} 50%{transform:rotate(34deg)} 100%{transform:rotate(20deg)} }
    @keyframes tap      { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2.5px)} }
    @keyframes twinkle  { 0%,100%{transform:scale(1) rotate(0)} 50%{transform:scale(1.12) rotate(8deg)} }
    @keyframes laugh    { 0%,100%{transform:scaleY(.7)} 50%{transform:scaleY(1.1)} }
    @keyframes pop      { 0%,100%{opacity:.3; transform:scale(.5) rotate(0)} 50%{opacity:1; transform:scale(1.2) rotate(40deg)} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="celebrando">
  <g class="body">
    <ellipse class="torso" cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="arm arm-l"><ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/></g>
    <g class="arm arm-r"><ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/></g>
    <ellipse class="foot foot-l" cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse class="foot foot-r" cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes">
    <ellipse cx="80" cy="93" rx="13" ry="10" fill="#ffffff" transform="rotate(-34 80 93)"/>
    <ellipse cx="120" cy="93" rx="13" ry="10" fill="#ffffff" transform="rotate(34 120 93)"/>
    <g transform="rotate(-34 80 93)"><path transform="translate(80 93) scale(0.8)" d="M0 -10 L2.9 -3.1 L9.5 -3.1 L4.3 1.2 L6.2 8 L0 4 L-6.2 8 L-4.3 1.2 L-9.5 -3.1 L-2.9 -3.1 Z" fill="#ffd23f"/></g>
    <g transform="rotate(34 120 93)"><path transform="translate(120 93) scale(0.8)" d="M0 -10 L2.9 -3.1 L9.5 -3.1 L4.3 1.2 L6.2 8 L0 4 L-6.2 8 L-4.3 1.2 L-9.5 -3.1 L-2.9 -3.1 Z" fill="#ffd23f"/></g>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 50 Q76 42 92 50"/>
    <path d="M138 50 Q124 42 108 50"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M80 122 Q100 153 120 122 Q100 132 80 122 Z" fill="#8a4a4a"/>
    <path d="M90 134 Q100 144 110 134 Q100 139 90 134 Z" fill="#ff8fa3"/>
  </g>
  </g>
  <g class="extra">
    <g class="s s1"><path transform="translate(42 40) scale(0.9)" d="M0 -10 L2.9 -3.1 L9.5 -3.1 L4.3 1.2 L6.2 8 L0 4 L-6.2 8 L-4.3 1.2 L-9.5 -3.1 L-2.9 -3.1 Z" fill="#ffd23f"/></g>
    <g class="s s2"><path transform="translate(160 38) scale(1.1)" d="M0 -10 L2.9 -3.1 L9.5 -3.1 L4.3 1.2 L6.2 8 L0 4 L-6.2 8 L-4.3 1.2 L-9.5 -3.1 L-2.9 -3.1 Z" fill="#ffd23f"/></g>
    <g class="s s3"><path transform="translate(168 78) scale(0.7)" d="M0 -10 L2.9 -3.1 L9.5 -3.1 L4.3 1.2 L6.2 8 L0 4 L-6.2 8 L-4.3 1.2 L-9.5 -3.1 L-2.9 -3.1 Z" fill="#ffd23f"/></g>
    <g class="s s4"><path transform="translate(34 80) scale(0.6)" d="M0 -10 L2.9 -3.1 L9.5 -3.1 L4.3 1.2 L6.2 8 L0 4 L-6.2 8 L-4.3 1.2 L-9.5 -3.1 L-2.9 -3.1 Z" fill="#ffd23f"/></g>
  </g>
  </g>
</svg>
