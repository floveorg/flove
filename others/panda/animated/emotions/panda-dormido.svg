<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda dormido (animado)">
  <title>Panda dormido · animado</title>
  <style><![CDATA[
    .head  { transform-box: view-box; transform-origin: 100px 150px; animation: dor-head 5.5s ease-in-out infinite; }
    .torso { transform-box: fill-box; transform-origin: center; animation: deep-breathe 5.5s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 74px 152px;  animation: dor-arm 5.5s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 126px 152px; animation: dor-arm 5.5s ease-in-out infinite; }
    .foot-l, .foot-r{ transform-box: fill-box; transform-origin: center; animation: deep-breathe 5.5s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center; animation: snore 5.5s ease-in-out infinite; }
    .z1{ transform-box: view-box; animation: zfloat 3.4s ease-in infinite; }
    .z2{ transform-box: view-box; animation: zfloat 3.4s ease-in infinite 1.7s; }

    @keyframes dor-head     { 0%,100%{transform:rotate(4deg)} 50%{transform:rotate(7deg)} }
    @keyframes deep-breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    @keyframes dor-arm      { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(2deg)} }
    @keyframes snore        { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(1.25)} }
    @keyframes zfloat       { 0%{opacity:0; transform:translate(0,0) scale(.7)} 25%{opacity:1} 100%{opacity:0; transform:translate(14px,-26px) scale(1.3)} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="dormido">
  <g class="body">
    <ellipse class="torso" cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="arm arm-l"><ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/></g>
    <g class="arm arm-r"><ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/></g>
    <ellipse class="foot foot-l" cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse class="foot foot-r" cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes" fill="none" stroke="#2b2b2b" stroke-width="4" stroke-linecap="round">
    <path d="M68 92 Q80 100 92 92" transform="rotate(-34 80 93)"/>
    <path d="M108 92 Q120 100 132 92" transform="rotate(34 120 93)"/>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 52 Q76 53 90 60"/>
    <path d="M138 52 Q124 53 110 60"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M95 126 Q100 130 105 126" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
  </g>
  </g>
  <g class="extra" fill="#2b2b2b" font-family="sans-serif" font-weight="bold">
    <g class="z1"><text x="150" y="42" font-size="13">z</text></g>
    <g class="z2"><text x="159" y="31" font-size="17">Z</text></g>
  </g>
  </g>
</svg>
