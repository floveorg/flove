<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda enamorado (animado)">
  <title>Panda enamorado · animado</title>
  <style><![CDATA[
    .panda { transform-box: view-box; }
    .head  { transform-box: view-box; transform-origin: 100px 150px; animation: ena-head 4.5s ease-in-out infinite; }
    .torso { transform-box: fill-box; transform-origin: center;     animation: breathe 4.5s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 74px 152px;  animation: ena-arml 4.5s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 126px 152px; animation: ena-armr 4.5s ease-in-out infinite; }
    .foot-l{ transform-box: fill-box; transform-origin: center;      animation: foot-a 4.5s ease-in-out infinite; }
    .foot-r{ transform-box: fill-box; transform-origin: center;      animation: foot-b 4.5s ease-in-out infinite; }
    .eye-l { transform-box: view-box; transform-origin: 80px 91px;   animation: beat 1.1s ease-in-out infinite; }
    .eye-r { transform-box: view-box; transform-origin: 120px 91px;  animation: beat 1.1s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center;      animation: mouth-bob 4.5s ease-in-out infinite; }
    .blush { animation: flush 2.2s ease-in-out infinite; }
    .h1 { transform-box: view-box; animation: rise 2.6s ease-in infinite; }
    .h2 { transform-box: view-box; animation: rise 2.6s ease-in infinite .9s; }
    .h3 { transform-box: view-box; animation: rise 2.6s ease-in infinite 1.7s; }

    @keyframes ena-head { 0%,100%{transform:rotate(-3.5deg)} 50%{transform:rotate(3.5deg)} }
    @keyframes breathe  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.035)} }
    @keyframes ena-arml { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(6deg)} }
    @keyframes ena-armr { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-6deg)} }
    @keyframes foot-a   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1.5px)} }
    @keyframes foot-b   { 0%,40%,100%{transform:translateY(0)} 70%{transform:translateY(-1.5px)} }
    @keyframes beat     { 0%,35%,100%{transform:scale(1)} 14%{transform:scale(1.22)} 50%{transform:scale(1.1)} }
    @keyframes mouth-bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-0.6px)} }
    @keyframes flush    { 0%,100%{opacity:.5} 50%{opacity:.95} }
    @keyframes rise     { 0%{opacity:0; transform:translateY(8px) scale(.5)} 25%{opacity:1} 100%{opacity:0; transform:translateY(-30px) scale(1.15)} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="enamorado">
  <!-- cuerpo -->
  <g class="body">
    <ellipse class="torso" cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="arm arm-l"><ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/></g>
    <g class="arm arm-r"><ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/></g>
    <ellipse class="foot foot-l" cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse class="foot foot-r" cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <!-- cabeza -->
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes">
    <g class="eye eye-l"><g transform="rotate(-34 80 93)"><path transform="translate(80 91) scale(1.7)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/></g></g>
    <g class="eye eye-r"><g transform="rotate(34 120 93)"><path transform="translate(120 91) scale(1.7)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/></g></g>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 50 Q76 42 92 50"/>
    <path d="M138 50 Q124 42 108 50"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M100 116 V120 M89 124 Q100 133 111 124" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g class="blush" fill="#ffb3c1" opacity="0.85">
    <ellipse cx="58" cy="108" rx="9" ry="5"/>
    <ellipse cx="142" cy="108" rx="9" ry="5"/>
  </g>
  </g>
  <!-- corazones flotantes -->
  <g class="extra">
    <g class="h h1"><path transform="translate(150 40) scale(1.1)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/></g>
    <g class="h h2"><path transform="translate(44 44) scale(0.85)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/></g>
    <g class="h h3"><path transform="translate(160 70) scale(0.7)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/></g>
  </g>
  </g>
</svg>
