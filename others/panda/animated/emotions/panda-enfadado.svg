<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda enfadado (animado)">
  <title>Panda enfadado · animado</title>
  <style><![CDATA[
    .head  { transform-box: view-box; transform-origin: 100px 150px; animation: enf-head .22s ease-in-out infinite; }
    .torso { transform-box: fill-box; transform-origin: center; animation: tense .9s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 74px 152px;  animation: shake .16s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 126px 152px; animation: shake .16s ease-in-out infinite; }
    .foot-l{ transform-box: fill-box; transform-origin: center; animation: stomp .5s ease-in-out infinite; }
    .foot-r{ transform-box: fill-box; transform-origin: center; animation: stomp .5s ease-in-out infinite .25s; }
    .brows { transform-box: view-box; transform-origin: 100px 55px; animation: furrow .9s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center; animation: grimace .9s ease-in-out infinite; }
    .flush { animation: anger-flush .9s ease-in-out infinite; }
    .vein  { transform-box: view-box; transform-origin: 158px 42px; animation: throb .55s ease-in-out infinite; }

    @keyframes enf-head { 0%,100%{transform:rotate(-1.6deg)} 50%{transform:rotate(1.6deg)} }
    @keyframes tense    { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
    @keyframes shake    { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
    @keyframes stomp    { 0%,60%,100%{transform:translateY(0)} 80%{transform:translateY(2px)} }
    @keyframes furrow   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(1.5px)} }
    @keyframes grimace  { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.18)} }
    @keyframes anger-flush { 0%,100%{opacity:.35} 50%{opacity:.8} }
    @keyframes throb    { 0%,100%{transform:scale(.85); opacity:.7} 50%{transform:scale(1.2); opacity:1} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="enfadado">
  <g class="body">
    <ellipse class="torso" cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="arm arm-l"><ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/></g>
    <g class="arm arm-r"><ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/></g>
    <ellipse class="foot foot-l" cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse class="foot foot-r" cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <!-- rubor de enfado (progresivo) -->
  <g class="flush" fill="#ff5a5a" opacity="0.5">
    <ellipse cx="64" cy="104" rx="10" ry="6"/>
    <ellipse cx="136" cy="104" rx="10" ry="6"/>
  </g>
  <g class="eyes">
    <ellipse cx="80" cy="94" rx="12" ry="5.5" fill="#ffffff" transform="rotate(-34 80 93)"/>
    <ellipse cx="120" cy="94" rx="12" ry="5.5" fill="#ffffff" transform="rotate(34 120 93)"/>
    <circle cx="80" cy="94" r="5" fill="#2b2b2b"/>
    <circle cx="120" cy="94" r="5" fill="#2b2b2b"/>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 50 Q76 54 90 64"/>
    <path d="M138 50 Q124 54 110 64"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M86 124 Q100 121 114 124 Q108 139 100 139 Q92 139 86 124 Z" fill="#8a4a4a"/>
    <path d="M88 125 H112" stroke="#ffffff" stroke-width="3"/>
  </g>
  </g>
  <!-- marca de enfado (vena) -->
  <g class="extra">
    <g class="vein" fill="none" stroke="#e23b3b" stroke-width="2.4" stroke-linecap="round">
      <path d="M150 36 L158 42 L150 48"/>
      <path d="M166 36 L158 42 L166 48"/>
    </g>
  </g>
  </g>
</svg>
