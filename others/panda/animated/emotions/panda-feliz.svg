<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda feliz (animado)">
  <title>Panda feliz · animado</title>
  <style><![CDATA[
    .head  { transform-box: view-box; transform-origin: 100px 102px; animation: fel-head 1s ease-in-out infinite; }
    .body  { transform-box: fill-box; transform-origin: center; animation: fel-bounce 1s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 77px 113px;  animation: wiggle-l .5s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 123px 113px; animation: wiggle-r .5s ease-in-out infinite; }
    .sock-l{ transform-box: fill-box; transform-origin: center; animation: toetap .5s ease-in-out infinite; }
    .sock-r{ transform-box: fill-box; transform-origin: center; animation: toetap .5s ease-in-out infinite .25s; }
    .eyes  { transform-box: view-box; transform-origin: 100px 55px; animation: joy-eyes 1.6s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center; animation: laugh .5s ease-in-out infinite; }
    .blush { animation: flush 1.4s ease-in-out infinite; }
    .k1{ transform-box: view-box; transform-origin: 40px 38px;  animation: pop 1.2s ease-in-out infinite; }
    .k2{ transform-box: view-box; transform-origin: 162px 36px; animation: pop 1.2s ease-in-out infinite .4s; }
    .k3{ transform-box: view-box; transform-origin: 170px 74px; animation: pop 1.2s ease-in-out infinite .8s; }

    @keyframes fel-head   { 0%,100%{transform:rotate(-4deg) translateY(0)} 50%{transform:rotate(4deg) translateY(-2px)} }
    @keyframes fel-bounce { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.05) scaleX(.98)} }
    @keyframes wiggle-l   { 0%,100%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} }
    @keyframes wiggle-r   { 0%,100%{transform:rotate(7deg)} 50%{transform:rotate(-7deg)} }
    @keyframes toetap     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    @keyframes joy-eyes   { 0%,80%,100%{transform:scaleY(1)} 90%{transform:scaleY(.6)} }
    @keyframes laugh      { 0%,100%{transform:scaleY(.78)} 50%{transform:scaleY(1.12)} }
    @keyframes flush      { 0%,100%{opacity:.6} 50%{opacity:.95} }
    @keyframes pop        { 0%,100%{opacity:.2; transform:scale(.4) rotate(0)} 50%{opacity:1; transform:scale(1.15) rotate(40deg)} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="feliz">
  <g class="legs" fill="#2b2b2b" stroke="#ffffff" stroke-width="1.75">
    <rect x="83.5" y="150" width="11" height="30" rx="5.5"/>
    <rect x="105.5" y="150" width="11" height="30" rx="5.5"/>
  </g>
  <g class="sock sock-l">
    <rect x="81.5" y="169" width="15" height="25" rx="7.5" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.5"/>
    <rect x="80.5" y="167" width="17" height="7" rx="3.5" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.5"/>
    <path d="M83 180 H95" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="sock sock-r">
    <rect x="103.5" y="169" width="15" height="25" rx="7.5" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.5"/>
    <rect x="102.5" y="167" width="17" height="7" rx="3.5" fill="#ffffff" stroke="#2b2b2b" stroke-width="1.5"/>
    <path d="M105 180 H117" stroke="#ff9ec2" stroke-width="2" stroke-linecap="round"/>
  </g>
  <g class="body">
    <ellipse cx="100" cy="126" rx="27" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  </g>
  <g class="arms" fill="#2b2b2b" stroke="#ffffff" stroke-width="1.75">
    <g class="arm-l"><path transform="rotate(110 77 113)" d="M77 113 Q77 107 69 107 Q60 108 59 120 L59 141 a3 8 0 0 0 6 0 a3 8 0 0 0 6 0 a3 8 0 0 0 6 0 L77 113 Z"/></g>
    <g class="arm-r"><path transform="rotate(-110 123 113)" d="M123 113 Q123 107 131 107 Q140 108 141 120 L141 141 a3 8 0 0 1 -6 0 a3 8 0 0 1 -6 0 a3 8 0 0 1 -6 0 L123 113 Z"/></g>
  </g>
  <g class="head">
    <circle cx="64" cy="26" r="16" fill="#2b2b2b" stroke="#ffffff" stroke-width="1.75"/>
    <circle cx="136" cy="26" r="16" fill="#2b2b2b" stroke="#ffffff" stroke-width="1.75"/>
    <circle cx="64" cy="26" r="8" fill="#5b4a4a"/>
    <circle cx="136" cy="26" r="8" fill="#5b4a4a"/>
    <circle cx="100" cy="56" r="46" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <path d="M70 28 C60 31 62 50 76 61 C87 69 100 60 96 48 C95 32 81 24 70 28 Z"/>
    <path d="M130 28 C140 31 138 50 124 61 C113 69 100 60 104 48 C105 32 119 24 130 28 Z"/>
  </g>
  <g class="eyes">
    <path d="M76 50 Q88 46 94 60 Q82 64 76 50 Z" fill="#ffffff"/>
    <path d="M124 50 Q112 46 106 60 Q118 64 124 50 Z" fill="#ffffff"/>
    <circle cx="86" cy="55" r="4.6" fill="#2b2b2b"/>
    <circle cx="114" cy="55" r="4.6" fill="#2b2b2b"/>
    <circle cx="84" cy="52.5" r="1.8" fill="#ffffff"/>
    <circle cx="116" cy="52.5" r="1.8" fill="#ffffff"/>
    <circle cx="88" cy="58" r="1" fill="#ffffff"/>
    <circle cx="112" cy="58" r="1" fill="#ffffff"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="69" rx="5.8" ry="4" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M100 73 V76" fill="none" stroke="#2b2b2b" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M82 78 Q100 101 118 78 Q100 88 82 78 Z" fill="#8a4a4a"/>
    <path d="M91 87 Q100 96 109 87 Q100 91 91 87 Z" fill="#ff8fa3"/>
  </g>
  <g class="blush" fill="#ffb3c1" opacity="0.8">
    <ellipse cx="70" cy="67" rx="7" ry="4"/>
    <ellipse cx="130" cy="67" rx="7" ry="4"/>
  </g>
  </g>
  <!-- destellos de alegría -->
  <g class="extra" fill="#ffd23f">
    <g class="k1"><path d="M40 32 L42 38 L48 40 L42 42 L40 48 L38 42 L32 40 L38 38 Z"/></g>
    <g class="k2"><path d="M162 30 L164 36 L170 38 L164 40 L162 46 L160 40 L154 38 L160 36 Z"/></g>
    <g class="k3"><path d="M170 68 L172 74 L178 76 L172 78 L170 84 L168 78 L162 76 L168 74 Z"/></g>
  </g>
  </g>
</svg>
