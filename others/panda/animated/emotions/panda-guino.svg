<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda guino (animado)">
  <title>Panda guiño · animado</title>
  <style><![CDATA[
    .head  { transform-box: view-box; transform-origin: 100px 150px; animation: gui-head 3s ease-in-out infinite; }
    .torso { transform-box: fill-box; transform-origin: center; animation: breathe 3s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 74px 152px;  animation: wave .8s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 126px 152px; animation: gui-armr 3s ease-in-out infinite; }
    .foot-l, .foot-r{ transform-box: fill-box; transform-origin: center; animation: breathe 3s ease-in-out infinite; }
    .eye-open { transform-box: view-box; transform-origin: 80px 93px; animation: blink 3.4s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center; animation: smirk 3s ease-in-out infinite; }
    .blush { animation: flush 2.4s ease-in-out infinite; }
    .spark { transform-box: view-box; transform-origin: 138px 72px; animation: sparkle 1.6s ease-in-out infinite; }

    @keyframes gui-head { 0%,100%{transform:rotate(2deg)} 50%{transform:rotate(-4deg)} }
    @keyframes breathe  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
    @keyframes wave     { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(-26deg)} }
    @keyframes gui-armr { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-4deg)} }
    @keyframes blink    { 0%,88%,100%{transform:scaleY(1)} 94%{transform:scaleY(.1)} }
    @keyframes smirk    { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-0.6px) rotate(-2deg)} }
    @keyframes flush    { 0%,100%{opacity:.55} 50%{opacity:.95} }
    @keyframes sparkle  { 0%,100%{opacity:0; transform:scale(.3) rotate(0)} 50%{opacity:1; transform:scale(1.1) rotate(45deg)} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="guino">
  <g class="body">
    <ellipse class="torso" cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="arm arm-l"><ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/></g>
    <g class="arm arm-r"><ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/></g>
    <ellipse class="foot foot-l" cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse class="foot foot-r" cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes">
    <g class="eye-open">
      <ellipse cx="80" cy="93" rx="13" ry="9" fill="#ffffff" transform="rotate(-34 80 93)"/>
      <circle cx="80" cy="93" r="6" fill="#2b2b2b"/>
      <circle cx="78" cy="90" r="2.3" fill="#ffffff"/>
    </g>
    <path d="M108 95 Q120 87 132 95" fill="none" stroke="#2b2b2b" stroke-width="4" stroke-linecap="round" transform="rotate(34 120 93)"/>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 52 Q76 53 90 60"/>
    <path d="M138 52 Q124 53 110 60"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M100 116 V120 M89 124 Q100 133 111 124" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g class="blush" fill="#ffb3c1" opacity="0.85">
    <ellipse cx="58" cy="108" rx="9" ry="5"/>
    <ellipse cx="142" cy="108" rx="9" ry="5"/>
  </g>
  </g>
  <!-- destello del guiño -->
  <g class="extra">
    <g class="spark" fill="#ffd23f"><path d="M138 64 L140 70 L146 72 L140 74 L138 80 L136 74 L130 72 L136 70 Z"/></g>
  </g>
  </g>
</svg>
