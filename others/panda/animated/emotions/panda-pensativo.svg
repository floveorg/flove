<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda pensativo (animado)">
  <title>Panda pensativo · animado</title>
  <style><![CDATA[
    .head  { transform-box: view-box; transform-origin: 100px 150px; animation: pen-head 4.5s ease-in-out infinite; }
    .torso { transform-box: fill-box; transform-origin: center; animation: breathe 4.5s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 74px 152px;  animation: pen-arm 4.5s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 126px 152px; animation: pen-arm 4.5s ease-in-out infinite; }
    .foot-l, .foot-r{ transform-box: fill-box; transform-origin: center; animation: breathe 4.5s ease-in-out infinite; }
    .eyes  { transform-box: view-box; transform-origin: 100px 90px; animation: ponder 4.5s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center; animation: chew 4.5s ease-in-out infinite; }
    .d1{ transform-box: view-box; transform-origin: 148px 42px; animation: think 2.4s ease-in-out infinite; }
    .d2{ transform-box: view-box; transform-origin: 157px 34px; animation: think 2.4s ease-in-out infinite .35s; }
    .d3{ transform-box: view-box; transform-origin: 169px 24px; animation: think 2.4s ease-in-out infinite .7s; }

    @keyframes pen-head { 0%,100%{transform:rotate(-5deg)} 55%{transform:rotate(-5deg)} 70%{transform:rotate(2deg)} 85%{transform:rotate(2deg)} }
    @keyframes breathe  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.025)} }
    @keyframes pen-arm  { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(2deg)} }
    @keyframes ponder   { 0%,100%{transform:translateX(0)} 30%{transform:translateX(2.5px)} 60%{transform:translateX(-2px)} }
    @keyframes chew     { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-1px) rotate(-3deg)} }
    @keyframes think    { 0%,100%{opacity:.25; transform:scale(.7)} 50%{opacity:1; transform:scale(1.15)} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="pensativo">
  <g class="body">
    <ellipse class="torso" cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="arm arm-l"><ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/></g>
    <g class="arm arm-r"><ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/></g>
    <ellipse class="foot foot-l" cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse class="foot foot-r" cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes">
    <ellipse cx="80" cy="93" rx="13" ry="9" fill="#ffffff" transform="rotate(-34 80 93)"/>
    <ellipse cx="120" cy="93" rx="13" ry="9" fill="#ffffff" transform="rotate(34 120 93)"/>
    <circle cx="83" cy="89" r="6" fill="#2b2b2b"/>
    <circle cx="123" cy="89" r="6" fill="#2b2b2b"/>
    <circle cx="81" cy="86" r="2.3" fill="#ffffff"/>
    <circle cx="121" cy="86" r="2.3" fill="#ffffff"/>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 54 Q76 55 90 60"/>
    <path d="M138 46 Q124 42 110 50"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M97 127 Q106 128 108 121" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
  </g>
  </g>
  <!-- burbujas de pensamiento -->
  <g class="extra" fill="#2b2b2b">
    <g class="d1"><circle cx="148" cy="42" r="2"/></g>
    <g class="d2"><circle cx="157" cy="34" r="3"/></g>
    <g class="d3"><circle cx="169" cy="24" r="4.5"/></g>
  </g>
  </g>
</svg>
