<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda preocupado (animado)">
  <title>Panda preocupado · animado</title>
  <style><![CDATA[
    .head  { transform-box: view-box; transform-origin: 100px 150px; animation: pre-head 1.6s ease-in-out infinite; }
    .torso { transform-box: fill-box; transform-origin: center; animation: breathe 2.2s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 74px 152px;  animation: fidget .9s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 126px 152px; animation: fidget .9s ease-in-out infinite .2s; }
    .foot-l{ transform-box: fill-box; transform-origin: center; animation: shift 1.6s ease-in-out infinite; }
    .foot-r{ transform-box: fill-box; transform-origin: center; animation: shift 1.6s ease-in-out infinite .8s; }
    .eyes  { transform-box: view-box; transform-origin: 100px 92px; animation: dart 1.6s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center; animation: wobble 1.6s ease-in-out infinite; }
    .drop  { transform-box: view-box; animation: sweat 2.4s ease-in infinite; }

    @keyframes pre-head { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    @keyframes breathe  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
    @keyframes fidget   { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(3deg)} }
    @keyframes shift    { 0%,100%{transform:translateX(0)} 50%{transform:translateX(1.5px)} }
    @keyframes dart     { 0%,100%{transform:translateX(0)} 25%{transform:translateX(2px)} 75%{transform:translateX(-2px)} }
    @keyframes wobble   { 0%,100%{transform:translateX(0)} 50%{transform:translateX(1.5px)} }
    @keyframes sweat    { 0%{opacity:0; transform:translateY(-6px)} 20%{opacity:1; transform:translateY(0)} 80%{opacity:1; transform:translateY(14px)} 100%{opacity:0; transform:translateY(20px)} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="preocupado">
  <g class="body">
    <ellipse class="torso" cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="arm arm-l"><ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/></g>
    <g class="arm arm-r"><ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/></g>
    <ellipse class="foot foot-l" cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse class="foot foot-r" cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes">
    <ellipse cx="80" cy="93" rx="11" ry="8" fill="#ffffff" transform="rotate(-34 80 93)"/>
    <ellipse cx="120" cy="93" rx="11" ry="8" fill="#ffffff" transform="rotate(34 120 93)"/>
    <circle cx="80" cy="92" r="5" fill="#2b2b2b"/>
    <circle cx="120" cy="92" r="5" fill="#2b2b2b"/>
    <circle cx="78" cy="89" r="2.3" fill="#ffffff"/>
    <circle cx="118" cy="89" r="2.3" fill="#ffffff"/>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 60 Q76 52 90 50"/>
    <path d="M138 60 Q124 52 110 50"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M88 127 Q94 121 100 127 Q106 133 112 127" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
  </g>
  </g>
  <!-- gota de sudor -->
  <g class="extra">
    <g class="drop"><path d="M150 56 q-5 9 0 13 q5 -4 0 -13 z" fill="#8fd3f4" stroke="#5bb4d6" stroke-width="1"/></g>
  </g>
  </g>
</svg>
