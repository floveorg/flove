<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda sorprendido (animado)">
  <title>Panda sorprendido · animado</title>
  <style><![CDATA[
    .head  { transform-box: view-box; transform-origin: 100px 150px; animation: jolt 2.4s ease-in-out infinite; }
    .torso { transform-box: fill-box; transform-origin: center; animation: gasp-body 2.4s ease-in-out infinite; }
    .arm-l { transform-box: view-box; transform-origin: 74px 152px;  animation: fly-l 2.4s ease-in-out infinite; }
    .arm-r { transform-box: view-box; transform-origin: 126px 152px; animation: fly-r 2.4s ease-in-out infinite; }
    .foot-l, .foot-r{ transform-box: fill-box; transform-origin: center; animation: hop 2.4s ease-in-out infinite; }
    .eyes  { transform-box: view-box; transform-origin: 100px 93px; animation: widen 2.4s ease-in-out infinite; }
    .brows { transform-box: view-box; transform-origin: 100px 48px; animation: raise 2.4s ease-in-out infinite; }
    .mouth { transform-box: fill-box; transform-origin: center; animation: gasp 2.4s ease-in-out infinite; }
    .bang  { transform-box: view-box; transform-origin: 150px 46px; animation: bang 2.4s ease-in-out infinite; }

    @keyframes jolt      { 0%,12%{transform:translateY(0) rotate(0)} 22%{transform:translateY(-5px) rotate(-3deg)} 45%,100%{transform:translateY(0) rotate(0)} }
    @keyframes gasp-body { 0%,12%{transform:scale(1)} 22%{transform:scale(1.06)} 45%,100%{transform:scale(1)} }
    @keyframes fly-l     { 0%,12%{transform:rotate(0deg)} 25%{transform:rotate(-26deg)} 55%,100%{transform:rotate(0deg)} }
    @keyframes fly-r     { 0%,12%{transform:rotate(0deg)} 25%{transform:rotate(26deg)} 55%,100%{transform:rotate(0deg)} }
    @keyframes hop       { 0%,12%{transform:translateY(0)} 22%{transform:translateY(-3px)} 45%,100%{transform:translateY(0)} }
    @keyframes widen     { 0%,12%{transform:scale(1)} 22%{transform:scale(1.22)} 60%,100%{transform:scale(1)} }
    @keyframes raise     { 0%,12%{transform:translateY(0)} 22%{transform:translateY(-3px)} 55%,100%{transform:translateY(0)} }
    @keyframes gasp      { 0%,12%{transform:scale(1)} 24%{transform:scale(1.3)} 60%,100%{transform:scale(1)} }
    @keyframes bang      { 0%,12%{opacity:0; transform:scale(.2)} 24%{opacity:1; transform:scale(1.15)} 55%{opacity:1; transform:scale(1)} 80%,100%{opacity:0; transform:scale(1)} }
    @media (prefers-reduced-motion: reduce){ .panda *{animation:none !important} }
  ]]></style>
  <g class="panda" data-emotion="sorprendido">
  <g class="body">
    <ellipse class="torso" cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <g class="arm arm-l"><ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/></g>
    <g class="arm arm-r"><ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/></g>
    <ellipse class="foot foot-l" cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse class="foot foot-r" cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes">
    <ellipse cx="80" cy="93" rx="14" ry="11" fill="#ffffff" transform="rotate(-34 80 93)"/>
    <ellipse cx="120" cy="93" rx="14" ry="11" fill="#ffffff" transform="rotate(34 120 93)"/>
    <circle cx="80" cy="94" r="5" fill="#2b2b2b"/>
    <circle cx="120" cy="94" r="5" fill="#2b2b2b"/>
    <circle cx="78" cy="91" r="2.3" fill="#ffffff"/>
    <circle cx="118" cy="91" r="2.3" fill="#ffffff"/>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 50 Q76 42 92 50"/>
    <path d="M138 50 Q124 42 108 50"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <ellipse cx="100" cy="127" rx="7" ry="9" fill="#8a4a4a"/>
  </g>
  </g>
  <!-- signo de exclamación -->
  <g class="extra">
    <g class="bang" fill="#ffb300">
      <rect x="147" y="30" width="6" height="18" rx="3"/>
      <circle cx="150" cy="54" r="3.4"/>
    </g>
  </g>
  </g>
</svg>
