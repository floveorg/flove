<!doctype html>
<html lang="es">
<meta charset="utf-8">
<title>Panda neutral · animación (habla → te muestra algo)</title>
<style>
  body { margin:0; font-family:system-ui,sans-serif; background:#fafafa; color:#2b2b2b;
         display:flex; flex-direction:column; align-items:center; gap:8px; padding:28px 16px; }
  h1 { font-weight:600; margin:0; font-size:20px; }
  p.sub { margin:0 0 16px; color:#888; }
  .stage { display:flex; gap:40px; flex-wrap:wrap; justify-content:center; align-items:flex-start; }
  figure { margin:0; text-align:center; }
  figcaption { margin-top:8px; font-size:13px; color:#666; }
  .card { background:#fff; border:1px solid #eee; border-radius:16px; padding:12px; }
  img.big { width:240px; height:240px; display:block; }
  .strip { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; max-width:560px; margin-top:24px; }
  .strip figure { background:#fff; border:1px solid #eee; border-radius:12px; padding:8px; }
  .strip img { width:96px; height:96px; }
  .strip figcaption { font-size:11px; }
</style>

<h1>Panda neutral · te habla y luego te muestra algo</h1>
<p class="sub">arriba a la derecha · 10 fotogramas</p>

<div class="stage">
  <figure class="card">
    <img class="big" id="vector" alt="reproductor vectorial">
    <figcaption>SVG en vivo (vectorial, nítido)</figcaption>
  </figure>
  <figure class="card">
    <img class="big" src="panda-neutral-talk.gif" alt="GIF animado">
    <figcaption>panda-neutral-talk.gif</figcaption>
  </figure>
</div>

<div class="strip" id="strip"></div>

<script>
  // mismas duraciones que build_gif.py
  const FR = [...Array(10).keys()].map(i => `frame-${String(i).padStart(2,'0')}.svg`);
  const MS = [260,180,180,220,150,150,150,180,520,300];

  // filmstrip
  const strip = document.getElementById('strip');
  FR.forEach((f,i) => {
    const fig = document.createElement('figure');
    fig.innerHTML = `<img src="${f}" alt="frame ${i}"><figcaption>${i}</figcaption>`;
    strip.appendChild(fig);
  });

  // reproductor vectorial con las duraciones reales
  const vec = document.getElementById('vector');
  let i = 0;
  (function tick(){ vec.src = FR[i]; const d = MS[i]; i = (i+1) % FR.length;
                    setTimeout(tick, d); })();
</script>
</html>
