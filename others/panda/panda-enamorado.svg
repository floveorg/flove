<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda enamorado">
  <title>Panda enamorado</title>
  <g class="panda" data-emotion="enamorado">
  <!-- cuerpo (≈ mitad de la cabeza) -->
  <g class="body">
    <ellipse cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/>
    <ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/>
    <ellipse cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <!-- cabeza (doble que el cuerpo) -->
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  </g>
  <!-- parches manga: diagonal arriba y afuera -->
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes">
    <g transform="rotate(-34 80 93)"><path transform="translate(80 91) scale(1.7)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/></g>
    <g transform="rotate(34 120 93)"><path transform="translate(120 91) scale(1.7)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/></g>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 50 Q76 42 92 50"/>
    <path d="M138 50 Q124 42 108 50"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M100 116 V120 M89 124 Q100 133 111 124" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g class="blush" fill="#ffb3c1" opacity="0.85">
    <ellipse cx="58" cy="108" rx="9" ry="5"/>
    <ellipse cx="142" cy="108" rx="9" ry="5"/>
  </g>
  <g class="extra"><path transform="translate(150 40) scale(1.1)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/><path transform="translate(44 44) scale(0.85)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/><path transform="translate(160 70) scale(0.7)" d="M0 -2 C -1.6 -4.2 -5 -3 -5 -0.4 C -5 2.2 -1.6 3.6 0 5.6 C 1.6 3.6 5 2.2 5 -0.4 C 5 -3 1.6 -4.2 0 -2 Z" fill="#ff5a7a"/></g>
  </g>
</svg>
