<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Panda preocupado">
  <title>Panda preocupado</title>
  <g class="panda" data-emotion="preocupado">
  <!-- cuerpo (≈ mitad de la cabeza) -->
  <g class="body">
    <ellipse cx="100" cy="174" rx="40" ry="28" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
    <ellipse cx="66" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(22 66 166)"/>
    <ellipse cx="134" cy="166" rx="12" ry="19" fill="#2b2b2b" transform="rotate(-22 134 166)"/>
    <ellipse cx="84" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
    <ellipse cx="116" cy="194" rx="13" ry="9" fill="#2b2b2b"/>
  </g>
  <!-- cabeza (doble que el cuerpo) -->
  <g class="head">
    <circle cx="60" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="140" cy="46" r="21" fill="#2b2b2b"/>
    <circle cx="60" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="140" cy="46" r="10" fill="#5b4a4a"/>
    <circle cx="100" cy="92" r="60" fill="#ffffff" stroke="#2b2b2b" stroke-width="3"/>
  </g>
  <!-- parches manga: diagonal arriba y afuera -->
  <g class="patches" fill="#2b2b2b">
    <ellipse cx="76" cy="86" rx="27" ry="16" transform="rotate(-34 76 86)"/>
    <ellipse cx="124" cy="86" rx="27" ry="16" transform="rotate(34 124 86)"/>
  </g>
  <g class="eyes">
    <ellipse cx="80" cy="93" rx="11" ry="8" fill="#ffffff" transform="rotate(-34 80 93)"/>
    <ellipse cx="120" cy="93" rx="11" ry="8" fill="#ffffff" transform="rotate(34 120 93)"/>
    <circle cx="80" cy="92" r="5" fill="#2b2b2b"/>
    <circle cx="120" cy="92" r="5" fill="#2b2b2b"/>
    <circle cx="78" cy="89" r="2.3" fill="#ffffff"/>
    <circle cx="118" cy="89" r="2.3" fill="#ffffff"/>
  </g>
  <g class="brows" fill="none" stroke="#2b2b2b" stroke-width="5" stroke-linecap="round">
    <path d="M62 60 Q76 52 90 50"/>
    <path d="M138 60 Q124 52 110 50"/>
  </g>
  <g class="nose"><ellipse cx="100" cy="110" rx="8" ry="5.5" fill="#2b2b2b"/></g>
  <g class="mouth">
    <path d="M88 127 Q94 121 100 127 Q106 133 112 127" fill="none" stroke="#2b2b2b" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g class="extra"><path d="M150 56 q-5 9 0 13 q5 -4 0 -13 z" fill="#8fd3f4" stroke="#5bb4d6" stroke-width="1"/></g>
  </g>
</svg>
