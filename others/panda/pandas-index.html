<!doctype html>
<html lang="es">
<meta charset="utf-8">
<title>Pandas flove · 11 emociones</title>
<style>
  body { margin:0; font-family:system-ui,sans-serif; background:#fafafa; color:#2b2b2b; }
  h1 { text-align:center; font-weight:600; padding:24px 0 4px; }
  p.sub { text-align:center; margin:0 0 24px; color:#888; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
          gap:16px; max-width:1100px; margin:0 auto 48px; padding:0 16px; }
  figure { margin:0; background:#fff; border:1px solid #eee; border-radius:14px;
           padding:14px; text-align:center; transition:transform .15s, box-shadow .15s; }
  figure:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.08); }
  figcaption { margin-top:8px; font-size:14px; color:#555; text-transform:capitalize; }
</style>
<h1>Pandas flove</h1>
<p class="sub">11 emociones · misma base, cara intercambiable</p>
<div class="grid">
    <figure><img src="panda-neutral.svg" width="160" height="160" alt="Panda neutral"><figcaption>neutral</figcaption></figure>
    <figure><img src="panda-feliz.svg" width="160" height="160" alt="Panda feliz"><figcaption>feliz</figcaption></figure>
    <figure><img src="panda-triste.svg" width="160" height="160" alt="Panda triste"><figcaption>triste</figcaption></figure>
    <figure><img src="panda-enfadado.svg" width="160" height="160" alt="Panda enfadado"><figcaption>enfadado</figcaption></figure>
    <figure><img src="panda-sorprendido.svg" width="160" height="160" alt="Panda sorprendido"><figcaption>sorprendido</figcaption></figure>
    <figure><img src="panda-enamorado.svg" width="160" height="160" alt="Panda enamorado"><figcaption>enamorado</figcaption></figure>
    <figure><img src="panda-dormido.svg" width="160" height="160" alt="Panda dormido"><figcaption>dormido</figcaption></figure>
    <figure><img src="panda-pensativo.svg" width="160" height="160" alt="Panda pensativo"><figcaption>pensativo</figcaption></figure>
    <figure><img src="panda-guino.svg" width="160" height="160" alt="Panda guino"><figcaption>guino</figcaption></figure>
    <figure><img src="panda-preocupado.svg" width="160" height="160" alt="Panda preocupado"><figcaption>preocupado</figcaption></figure>
    <figure><img src="panda-celebrando.svg" width="160" height="160" alt="Panda celebrando"><figcaption>celebrando</figcaption></figure>
</div>
</html>
